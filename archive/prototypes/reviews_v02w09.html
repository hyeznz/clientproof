<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F6F7F9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="format-detection" content="telephone=no">
<title>강봉원 검증 후기 — 이사짐캐리</title>
<!-- ===== 폰트: Pretendard Variable (jsDelivr CDN, 동적 서브셋) =====
     페이지에 실제 쓰이는 글자만 골라 로드되어 속도가 빠름.
     폰트를 바꾸려면 이 <link> 한 줄과 CSS의 font-family 값만 교체하면 됩니다. -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  :root {
    /* ===== 새 팔레트 (4색 시스템) =====
       카드색과 글자색의 페어링 규칙:
       - black(#171717)  카드 → orange(#FE5F15) 글자
       - orange(#FE5F15) 카드 → black(#171717) 글자
       - dark gray(#4D4D4D)  카드 → light gray(#DEDEDE) 글자
       - light gray(#DEDEDE) 카드 → dark gray(#4D4D4D) 글자
    */
    --black: #171717;       /* 살짝 따뜻한 다크 */
    --orange: #FE5F15;      /* 비비드 오렌지 */
    --dark-gray: #4D4D4D;   /* 다크 그레이 */
    --light-gray: #DEDEDE;  /* 라이트 그레이 */

    /* 배경 = 레퍼런스 이미지의 실제 배경 픽셀값 (#F6F7F9, 아주 연한 쿨 그레이) */
    --bg: #F6F7F9;

    /* 텍스트 계조용 (dark-gray 기반) */
    --ink-80: rgba(77,77,77,0.85);
    --ink-60: rgba(77,77,77,0.65);
    --ink-40: rgba(77,77,77,0.4);
    --ink-10: rgba(77,77,77,0.15);

    /* 통일된 타이포 — 카드 크기별 차등 없음, 모바일 기준 */
    --text-micro: 11px;     /* 좌상단 작은 키워드 */
    --text-xs: 11px;
    --text-sm: 13px;
    --text-keyword: 26px;   /* 모바일 좁은 카드에서 wrap 방지 위해 축소 */

    /* 카드 높이 단위 */
    --row-unit: 40px;
    --gap: 8px;
    --radius: 14px;      /* 카드 모서리 둥글게 */
    --pad: 18px;         /* 카드 내부 여백 */

    /* ===== 폰트 스택 (한 곳에서 관리) =====
       CDN의 Pretendard Variable을 최우선, 로컬 Pretendard, 시스템 폰트 순으로 fallback.
       다른 폰트로 바꾸려면:
         1) 상단 <link>의 CDN URL 교체
         2) 아래 --font-sans 값의 첫 항목(폰트 이름)을 새 폰트 이름으로 교체
    */
    --font-sans: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--black);
    line-height: 1.3;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    word-break: keep-all;
    overflow-x: hidden;
    padding-top: env(safe-area-inset-top);
    padding-bottom: calc(40px + env(safe-area-inset-bottom));
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    font-feature-settings: "ss18", "ss19", "tnum";  /* 한글 미세조정 + 숫자 고정폭 */
    text-rendering: optimizeLegibility;
  }

  /* 메타·넘버 텍스트: Pretendard 기반 + 탭ular 숫자 + 미세 letter-spacing으로 모노 느낌 */
  .mono {
    font-family: var(--font-sans);
    font-feature-settings: "tnum", "ss04";
    letter-spacing: 0.02em;
    font-variant-numeric: tabular-nums;
  }

  /* ============ 상단 룰 라인 ============ */
  .topline {
    height: 1px;
    background: var(--black);
    margin: 0 16px;
    max-width: 1280px;
  }
  .topline-wrap {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 16px;
  }
  .topline-wrap .topline { margin: 0; }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 16px;
    max-width: 1280px;
    margin: 0 auto;
  }
  .header-label {
    font-family: var(--font-sans);
    font-size: var(--text-micro);
    letter-spacing: 0.18em;
    color: var(--black);
    font-weight: 600;
    font-feature-settings: "tnum";
    text-transform: uppercase;
  }
  .header-logo {
    width: 30px; height: 30px;
    background: var(--black);
    color: var(--light-gray);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-sans);
    font-weight: 800;
    font-size: 14px;
    border-radius: 50%;
    letter-spacing: -0.02em;
  }

  /* ============ 거대 타이틀 블록 ============ */
  .title-block {
    max-width: 1280px;
    margin: 4px auto 0;
    padding: 0 16px 4px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: end;
  }
  .main-title {
    font-family: var(--font-sans);
    font-weight: 900;
    font-size: clamp(68px, 20vw, 150px);
    line-height: 0.86;
    letter-spacing: -0.06em;
    color: var(--black);
  }
  .title-meta {
    font-family: var(--font-sans);
    font-size: 10.5px;
    font-weight: 500;
    line-height: 1.45;
    text-align: right;
    color: var(--black);
    padding-bottom: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-feature-settings: "tnum";
  }
  .title-meta strong {
    font-weight: 700;
    font-size: 13px;
    display: block;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }

  /* ============ 오렌지 배너 ============ */
  .banner {
    max-width: 1280px;
    margin: 14px auto 0;
    padding: 0 16px;
  }
  .banner-inner {
    background: var(--orange);
    color: var(--black);
    padding: 11px 16px;
    font-family: var(--font-sans);
    font-size: 10.5px;
    letter-spacing: 0.12em;
    line-height: 1.65;
    font-weight: 600;
    font-feature-settings: "tnum";
    text-transform: uppercase;
  }
  .banner-inner .sep {
    margin: 0 6px;
    opacity: 0.6;
  }

  /* ============ 필터 바 (2행 × 5열 그리드) ============ */
  .filter-bar {
    max-width: 1280px;
    margin: 18px auto 6px;
    padding: 0 16px;
  }
  .type-chips {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  .chip {
    padding: 11px 0;
    background: transparent;
    border: 1px solid var(--black);
    border-radius: 999px;   /* pill 모양으로 더 정제된 느낌 */
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 600;
    color: var(--black);
    cursor: pointer;
    transition: all .18s ease;
    white-space: nowrap;
    letter-spacing: -0.015em;
    text-align: center;
  }
  .chip:hover { background: var(--black); color: var(--light-gray); }
  .chip.active {
    background: var(--black);
    color: var(--light-gray);
    font-weight: 700;
  }

  /* ============ 벤토 그리드 ============ */
  .bento-section {
    padding: 12px 16px 40px;
    max-width: 1280px;
    margin: 0 auto;
  }

  .bento {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: var(--row-unit);
    gap: var(--gap);
    grid-auto-flow: dense;
  }

  .cell {
    position: relative;
    overflow: hidden;
    border-radius: var(--radius);
    padding: var(--pad);
    display: flex;
    flex-direction: column;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: rgba(0,0,0,0.08);
    outline: none;
    /* 카드 전체 영역이 클릭 가능 — 자식 요소도 클릭을 가로채지 않음 */
    pointer-events: auto;
  }
  .cell:focus-visible {
    outline: 2px solid var(--orange);
    outline-offset: 2px;
  }
  /* 텍스트도 드래그 선택 불가로 (클릭 시 text selection 방해 방지) */
  .cell-sub, .cell-keyword { user-select: none; -webkit-user-select: none; }

  /* 높이 시스템 */
  .cell.h-s { grid-row: span 4; }
  .cell.h-m { grid-row: span 6; }
  .cell.h-l { grid-row: span 8; }

  /* ===== 색상 변형 (4가지, 각 카드색에 짝지어진 글자색) =====
     v-light  : light-gray 배경 + dark-gray 글자 (흰색 대신 기본 밝은 카드)
     v-dark   : dark-gray 배경 + light-gray 글자
     v-orange : orange 배경 + black 글자
     v-black  : black 배경 + orange 글자 (유일하게 액센트색 글자)
  */
  .cell.v-light {
    background: var(--light-gray);
    color: var(--dark-gray);
  }
  .cell.v-dark {
    background: var(--dark-gray);
    color: var(--light-gray);
  }
  .cell.v-orange {
    background: var(--orange);
    color: var(--black);
  }
  .cell.v-black {
    background: var(--black);
    color: var(--orange);
  }

  /* ===== 카드 내부: 레퍼런스 구조대로 요소 3개만 ===== */
  /* 상단 영역: 좌측 작은 키워드 + 우측 화살표 */
  .cell-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 4px;
  }

  /* 좌상단 작은 키워드 — 타입 라벨 */
  .cell-sub {
    font-family: var(--font-sans);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.04em;
    line-height: 1.3;
    opacity: 0.55;
    text-transform: uppercase;
    font-feature-settings: "tnum";
  }

  /* 우상단 화살표 (↗) */
  .cell-arrow {
    width: 15px;
    height: 15px;
    flex-shrink: 0;
    opacity: 0.7;
    transition: opacity .2s ease, transform .2s ease;
  }
  .cell:hover .cell-arrow { opacity: 1; transform: translate(1px, -1px); }

  /* 좌하단 메인 키워드 — 카드 크기와 무관하게 동일 크기로 통일 */
  /* 기준: "인생 최악의 이사, 여기서 끝" × 1.5배 */
  .cell-keyword {
    font-family: var(--font-sans);
    font-weight: 800;
    font-size: 26px;
    line-height: 1.2;
    letter-spacing: -0.055em;   /* 자간 축소 → 카드 안에서 가지런히 */
    text-align: left;
    white-space: normal;         /* 자연스러운 wrap */
    word-break: keep-all;
    overflow-wrap: break-word;
    hyphens: none;
    margin-top: auto;            /* 하단으로 밀기 */
  }

  /* ============ 하단 룰 라인 ============ */
  .bottomline {
    height: 1px;
    background: var(--black);
    max-width: 1280px;
    margin: 24px auto 0;
  }
  .footer-info {
    max-width: 1280px;
    margin: 0 auto;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    font-family: var(--font-sans);
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-60);
    font-feature-settings: "tnum";
  }

  /* ============ 데스크탑 — 2열 고정, 모바일 비율 유지 ============ */
  @media (min-width: 768px) {
    :root {
      --row-unit: 50px;
      --pad: 24px;
    }
    /* 2열 고정 — 3열/4열 확장 안 함 */
    .bento {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    /* PC에서도 모바일 세로 비율 유지 — 중앙 정렬 + 최대폭 제한 */
    body {
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }
    /* 키워드 크기 — 데스크탑에서도 통일 크기 (기준 × 1.5) */
    .cell-keyword { font-size: 30px; line-height: 1.18; }
    .header, .title-block, .banner, .filter-bar, .bento-section, .footer-info {
      padding-left: 24px;
      padding-right: 24px;
    }
    .topline, .bottomline {
      margin-left: 24px;
      margin-right: 24px;
    }
  }

  /* ============ 진입 애니메이션 — opacity만 사용 (transform 없음 → 클릭 안정) ============ */
  .cell {
    animation: fade-in .4s ease both;
    animation-delay: calc(var(--card-index, 0) * 0.02s);
  }
  @keyframes fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  html, body {
    overscroll-behavior-y: contain;
  }

  /* hover 효과 — transform 대신 box-shadow로 변경 (카드 위치 고정) */
  @media (hover: hover) and (pointer: fine) {
    .cell {
      transition: box-shadow .2s ease, filter .15s ease;
    }
    .cell:hover {
      box-shadow: 0 6px 24px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
      filter: brightness(1.03);
    }
    .cell:active {
      filter: brightness(0.97);
    }
  }

  /* reduced-motion 존중 */
  @media (prefers-reduced-motion: reduce) {
    .cell {
      animation: none;
      transition: none;
      transform: none;
    }
  }

  /* ============ Floating Card Modal (Glassmorphism) ============ */
  /* 오버레이: 단순 어둡게만 (블러 없음) */
  .sheet-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    pointer-events: none;
    background: rgba(0, 0, 0, 0);
    transition: background .4s ease;
  }
  .sheet-overlay.open {
    pointer-events: auto;
    background: rgba(0, 0, 0, 0.35);
  }

  /* 시트: Glassmorphism card — 반투명 + 자체 블러 + 유리 테두리 */
  .sheet {
    position: fixed;
    z-index: 101;
    left: 12px;
    right: 12px;
    bottom: 12px;
    top: auto;
    max-height: calc(85vh - 24px);
    /* 핵심: 반투명 배경 + 자체 블러 → 뒤 콘텐츠 색상이 번져 들어옴 */
    background: rgba(240, 240, 240, 0.72);
    -webkit-backdrop-filter: blur(28px) saturate(140%);
    backdrop-filter: blur(28px) saturate(140%);
    /* 유리 엣지 테두리 */
    border: 1px solid rgba(255, 255, 255, 0.45);
    border-radius: 24px;
    transform: translateY(calc(100% + 24px));
    transition: transform .5s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity .3s ease;
    opacity: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding-bottom: env(safe-area-inset-bottom);
    /* 넓고 부드러운 그림자 (레퍼런스처럼 spread 큰) */
    box-shadow: 0 12px 60px rgba(0, 0, 0, 0.12),
                0 4px 20px rgba(0, 0, 0, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);  /* 상단 내부 하이라이트 */
  }
  .sheet.open {
    transform: translateY(0);
    opacity: 1;
  }
  .sheet.dragging {
    transition: none;
  }

  /* 데스크탑 */
  @media (min-width: 768px) {
    .sheet {
      left: 50%;
      right: auto;
      bottom: auto;
      top: 50%;
      transform: translate(-50%, calc(-50% + 60px));
      width: 520px;
      max-width: calc(100vw - 48px);
      max-height: 80vh;
    }
    .sheet.open {
      transform: translate(-50%, -50%);
    }
  }

  /* 드래그 핸들 */
  .sheet-handle {
    flex-shrink: 0;
    padding: 12px 0 4px;
    display: flex;
    justify-content: center;
    cursor: grab;
    touch-action: none;
  }
  .sheet-handle::before {
    content: '';
    width: 36px;
    height: 4px;
    background: var(--dark-gray);
    opacity: 0.18;
    border-radius: 2px;
  }
  @media (min-width: 768px) {
    .sheet-handle { display: none; }
  }

  /* 닫기 버튼 — 글라스 위에서 잘 보이도록 */
  .sheet-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.06);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 2;
    color: var(--dark-gray);
    transition: background .2s;
  }
  .sheet-close:hover { background: rgba(0, 0, 0, 0.12); }
  .sheet-close svg {
    width: 14px;
    height: 14px;
  }

  /* 시트 상단 (컴팩트 — 헤더 고정 영역 최소화) */
  .sheet-header {
    flex-shrink: 0;
    padding: 16px 24px 12px;
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
  }
  .sheet-sub {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--dark-gray);
    opacity: 0.7;
    margin-bottom: 4px;       /* 12px → 4px: 태그와 타이틀 밀착 */
  }
  .sheet-title {
    font-weight: 800;
    font-size: 19px;           /* 32px → 19px (약 60%) */
    letter-spacing: -0.03em;
    line-height: 1.3;
    white-space: nowrap;       /* pre-line → nowrap: 무조건 1줄 */
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--black);
  }
  @media (min-width: 768px) {
    .sheet-title { font-size: 24px; }  /* 40px → 24px */
  }

  /* 시트 본문 (스크롤 가능) */
  .sheet-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px 32px;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    /* Firefox: 얇은 스크롤바, 레일 투명 */
    scrollbar-width: thin;
    scrollbar-color: rgba(0,0,0,0.15) transparent;
  }
  /* Webkit (Chrome, Safari, Edge): thumb만 보이는 미니멀 스크롤 */
  .sheet-body::-webkit-scrollbar {
    width: 4px;
  }
  .sheet-body::-webkit-scrollbar-track {
    background: transparent;
  }
  .sheet-body::-webkit-scrollbar-thumb {
    background: rgba(0,0,0,0.15);
    border-radius: 4px;
  }
  .sheet-body::-webkit-scrollbar-thumb:hover {
    background: rgba(0,0,0,0.25);
  }
  .sheet-meta {
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 12px;
    color: var(--dark-gray);
    opacity: 0.6;
    margin-bottom: 22px;
    font-family: var(--font-sans);
    font-weight: 500;
    letter-spacing: 0.02em;
    font-feature-settings: "tnum";
  }
  .sheet-meta .dot {
    width: 3px;
    height: 3px;
    background: currentColor;
    border-radius: 50%;
  }

  /* highlight 문장 — 제거 요청에 따라 숨김 처리 */
  .sheet-highlight {
    display: none !important;
  }

  /* 전체 리뷰 본문 */
  .sheet-fulltext {
    font-size: 15px;
    line-height: 1.65;

  80: "이사가 결정되고,\n제일 큰 고민 걱정이 업체 선택이었어요.\n\n주변 지인들한테도 묻고 고민하던 중,\n강봉원에서 이사 후기를 보게 되었죠.\n협력업체 GS이사몰을 알게 되어서\n견적을 보기로 했는데,\n집에 오신 날 바로 계약했어요. ^^\n\n처음엔 말씀을 너무 잘하셔서\n나 홀린 건가 싶기도 했는데,\n해보고 나니 정말 잘한 선택이었네요.\n\n아니, 왜 하필 제가 이사하는 그날 비가 올까요. ㅠㅠ\n비 오는 날 이사라\n물건 젖을까 걱정이 이만저만이 아니었는데,\n약속한 시간에 젊은 분들이 우르르 오셨어요.\n\n팀워크가 아주 잘 맞으시더라고요.\n착착 짐 정리가 진행되었죠.\n비가 왔지만,\n제 물건들은 비가 온 줄 모르겠더라고요. ^^\n너무 잘 포장해서 옮겨주셨어요.\n\n원하는 부분 소통도 잘되고, 친절하시고,\n진짜 다들 인상도 좋으시고 상냥하셨어요.\n\n이사 내내 분위기가 참 좋았어요.\n비 오는 날이어서 더 힘드셨을 텐데도\n웃으시며 응대해주시고,\n열심히 해주셔서 감사했습니다.\n\n사정상 티비를 벽에 걸 수도,\n스탠드로 세울 수도 없어서\n이동식 거치대를 산 게 있는데,\n그것도 다 조립해주시고\n깔끔하게 마무리해 주고 가셨답니다.\n\nGS이사몰 강추합니다.",
  79: "이사한 지 한 달이 다 되어가니\n정리도 좀 하고, 이제서야 후기를 씁니다. ^^\n\n예전부터 이사하게 되면\n후기 좋은 GS이사몰에서 해야지,\n계속 찜해 두었거든요.\n\n저희가 사정상 2년 전 7월에도 한 번 이사를 했는데,\n그때는 이미 예약이 꽉 차서\n어쩔 수 없이 싼 곳에서 했습니다.\n\n그런데 이사하고 가시고 나니\n벽지도 찢으시고는 쇼파로 가려 놓고 가셔서,\n나중에 발견해 너무 속 쓰린 경험이 있었습니다.\n\n이번 이사는\n가장 바쁘다는 2월 말에 하게 되었고,\n인테리어를 새로 한 집이라\n기필코 GS이사몰에서 하겠다는 마음으로\n이사 세 달 전인 12월 초에 전화를 드렸습니다.\n다른 데 비교 견적도 안 받고\n바로 계약했네요.\n\n그전에 이사할 때는\n직원분들이 다 연세가 있으시거나,\n외국인 분들도 오셔서 소통이 어려웠는데,\n사장님뿐만 아니라 직원분들도\n다 젊은 분들이셨어요.\n\n이모님도 완전 베테랑이셔서\n손도 엄청 빠르시고,\n저보다 살림에 대해 더 잘 아셔서\n제가 따로 손볼 것 없이\n착착 꼼꼼하게 정리해 주셨어요.\n\n이삿짐센터는 팀 구성원도 정말 중요한데,\n이분들은 합도 정말 잘 맞으셔서\n이사 내내 분위기도 너무 좋았고 손들도 빠르십니다.\n\n사장님은 정말 해결사이신 듯!\n베란다 수납장 때문에 진짜 머리가 아팠는데,\n고민이 무색하게\n선반을 뚝딱 잘 설치해 주고 가시고,\n\n직원분들이 애들 장난감 수납장도 설치하시면서\n서랍 다 꺼내서 먼지까지 싹 닦아주시고.\n\n이런 이삿짐센터 처음이라며\n남편이 이사 맡기길 잘 했다고 했답니다. ^^\n다음에도 이사하게 된다면\n그때도 고민 없이 무조건 선택할 거예요.",
  78: "카페에서 워낙 후기가 좋아\n다른 곳 견적도 안 보고\n바로 계약하고 오늘 이사했습니다.\n\n혹시라도 다른 데 했음\n어쩔 뻔했나 싶을 정도로\n아주 완벽한 이사였습니다.\n\n시간 딱 맞춰주시고,\n요청사항 다 들어주시고!\n제 동생이 이사하는 거 보더니\n'이런 게 진짜 포장이사지' 하면서 감탄을 하고. ㅋ\n\n젊은 팀장님과 아들 같은 직원분들,\n오늘 너무 추운데 정말 고생하셨습니다.\n워낙 손이 빠르다 보니 오전에 이사 끝내고\n덕분에 띵가띵가 쉬고 있지요. ^^\n\n내일도 부산까지 가신다고 엄마가 그러시던데\n항상 길 조심하시고,\n혹시라도 주변에 이사하게 되면 널리 소문낼게요.\n정말 감사합니다. ^^",
  77: "지난주에 GS이사몰을 통해서 이사했어요.\n날짜가 너무 급하게 잡혀서 첫 전화를 했었는데,\n현장 견적 내주시고 다른 곳과도 비교해보라며\n자신감 있는 모습에서 깊은 신뢰를 느꼈어요.\n\n팀장님을 필두로 총 6분이 오셨는데,\n정말 손발이 잘 맞고\n일을 잘하시는 분들이구나 딱 느꼈어요.\n\n허둥지둥하는 모습이 하나도 없이\n일을 착착착 일사천리로 하시더라고요.\n\n저희가 평수를 많이 줄여서 가는 거라\n짐을 엄청 처리했는데도 막상 보니 정말 많더라고요.\n이 짐을 다 어떻게 정리해야 하나\n정말 머릿속이 하얘졌었는데,\n\n그 많은 짐들을 잘 안 쓰는 건 안쪽으로,\n자주 쓰는 건 손에 잘 닿는 곳으로\n알아서 착착착 다 정리해서 넣어주셔서\n2번 정리할 필요가 전혀 없었어요.\n\n또 마무리 청소까지 확실하게 해주시는 모습\n너무너무 감동했습니다.\n\n오늘 회사에 출근해서\n이사 잘했다고 직원들한테 엄청 자랑했습니다.\n다음 이사 때도 무조건 연락드리겠습니다.",
  76: "설날이고 정신없어서\n까먹고 있다가 작성하는 이사 후기입니다.\n저희는 46평에서 33평으로\n무려 13평이나 줄여서 이사 가는 상황이었는데요. ㅠㅠ\n\n아침부터 젊으신 분들이 우르르 오셔서\n짐 정리를 싹 해주시는데,\n우와 이사하는 집에 활기가 솟네요.\n팀워크가 이렇게도 좋을 수 있나 싶을 정도로\n분위기가 정말 좋았습니다.\n\n큰 가구들도 엄청 많아서\n처음엔 이걸 어떻게 옮기나,\n이 짐이 다 들어갈 순 있을까 했는데,\n매니저님이 그걸 완벽하게 해내 주셨어요.\n\n버릴 것은 마지막에 한 번에 모아서\n깔끔하게 버려주시고,\n여기 들어오실 분 안 어색하게\n마지막까지 정리도 싹 해주셨습니다.\n\n이사 온 집은 사다리가 안 되고\n엘베로만 가능해서 힘드셨을 텐데,\n끝까지 파이팅 넘쳐가며 일해주셔서 너무나 감사했어요.\n\n아, 또 제가 방 배치를 좀 특이하게 했는데\n그거 칼같이 딱 짚어주시고, ㅋㅋㅋㅋ\n센스 있게 알려주셔서 두 번 일 안 했어요.\n\n드레스룸이 있는 집인데\n처음엔 분해할 생각조차 없었는데,\n매니저님이 해체해주시면서\n스타일러 딱 넣어주셔가지고 ㅠㅠㅠ\n진짜 가구 위치를 제자리에 맞게\n짚어주시는 게 너무 좋았습니다.\n\n이사업체 고르는 게 정말 일이라던데\n좋은 업체 알게 돼서 너무 좋았고요.\n다음에 다시 창동 들어가게 될 텐데\n그때 또 무조건 이용하려고요.",
  75: "부모님이 노원에서\n중랑으로 이사하시는데,\n괜찮은 업체를 찾다가\n카페에서 알게 돼 연락드렸어요.\n\n부모님 연세가 많으셔서\n걱정이 많았는데,\n통화 몇 번으로 신뢰가 확 갔어요.\n\n부모님이 큰 평수에서\n작은 평수로 가시는 거고,\n대가족이 살았던 집인데다\n거의 20여 년 만에 이사하시는 거라\n짐도 정말 많았을 텐데요. ㅠㅠ\n\n처음 제시하신 가격보다\n견적이 더 많이 나왔던 거 같은데,\n어렵게 맞춰주셨던 것 같아요. ㅠ\n\n유연하게 처리해주시는 과정이\n너무 마음에 들었고,\n최종 금액도 매우 합리적이었다고\n생각합니다.\n\n이사 당일에 제가\n직접 가볼 수가 없어서,\n다른 가족들에게 후기를 부탁했는데\n모두 이사업체 잘 골랐다며\n만족해하셨어요.\n\n전체적으로 일하시는 분들\n합이 잘 맞아 보였고,\n주방 담당 이모님과 실장님이\n정말 일을 잘해주신다고 하시더라고요.\n\n당일 아침 8시쯤부터 시작해서\n11시 넘어 원래 집 이삿짐 다 빼고,\n이사 간 집 짐 정리를\n13시부터 시작해서\n해지기 전에 일을 다 끝내셨다고 해요.\n\n저도 이사를 몇 번 해봤는데,\n손도 정말 빠르셨던 것 같고\n당연히 망가진 물건 하나도 없고요.\n부모님이 일단 제일 만족하셨어요.\n\n몇 년 후에 저도 이사를 가야 하는데,\n꼭 여기로 다시 연락드릴 거에용.\n\n추운 날씨에 정말 고생 많으셨고,\n부모님 댁 이사 잘 마무리해주셔서\n너무너무 감사합니다.\n고민 중이신 분들 믿고 맡겨보셔요.\nGS이사몰 추천합니다.",
  73: "정말 오랜만에 이사를 왔어요.\n이사에 감도 없는 편인데, ^^\n기한이 얼마 없어서\n비교할 생각도 못 했고,\n카페에서 후기가 좋아서\n믿고 계약 진행하였어요.\n\n꼼꼼히 젊은 사장님이 오셔서\n체크하셨고,\n한 달 지나 이사 전날 연락주셔서\n친절히 안내해주셨어요.\n\n이삿날 일찍 오매불망 기다렸는데,\n7시 30분쯤부터 팀원분들이 오셔서\n함께 이야기도 하고,\n짐을 어찌나 빠르게 척척 싸시는지\n정말 감탄했어요.\n\n진짜 빠르게 2시간 30분 정도에\n엄청난 짐을 다 꼼꼼히 싸셨고요.\n가구도 가전도,\n심지어 그릇 하나도 깨진 거 없이\n다 잘 도착했어요.\n\n아이 방 침대 밑에 들어가\n잃어버렸던 악세사리도 다 찾아서\n챙겨와 주시고.\n\n진짜 20년 만에 이사라\n먼지도 엄청 많았을 텐데,\n싹 다 먼지 하나 없이\n일일이 제거하시면서\n가구 놓아주시는 모습에\n또 한 번 감동했습니다.\n\n세탁실 세탁기 자리\n연결 호수가 짧아서,\n그렇게 배치하면\n공간 허비가 너무 많다며\n호수를 사 오면 설치해주시겠다 하셔서\n공간도 넉넉히 잘 사용할 수\n있게 되었습니다.\n\n왜 전문가이신지 알겠더라고요.\n진짜 제가 지금껏 해본 이사 중\n최고의 팀♡이었습니다.\n\n작은 하나까지도 소중히 포장하시고\n내 집처럼 꼼꼼히 닦아주시는 걸 보며,\n매일 이렇게 하시면\n진짜 힘드시겠어요, 라는 말이\n먼저 나왔습니다.\n\n하루 종일 힘드셨을 텐데,\n정말 끝까지 친절하게\n어디 더 필요한 곳은 없는지\n물어봐 주시고 정말 감사했어요.\n\n덕분에 큰 숙제 끝냈습니다.\n주위에 이사 예정이시면\n저는 무조건 추천할 거예요. ^^\n\n또 이사 가게 된다면 100%로\n저는 GS이사몰에 예약할 겁니다.\n늘 건강하시고 행운 가득하세요. ♡",
  72: "이사하고 일주일 만에 후기를 쓰네요.\n\n지난 금요일, 12여 년간 살던 창동을 떠나\n일산으로 이사 왔어요.\n\n이사 준비하면서 업체 선정을 제일 먼저 했는데,\n여기저기 견적을 넣어보고는\n다른 업체보다 조금 비싸지만 강봉원 제휴 업체인\nGS로 결정했어요.\n\n10여 년 전 바로 옆 동으로 이사할 때\n직원이 더 왔다고 웃돈을 요구하더라고요.\n제휴 업체이니 이런 부분은 없을 것 같고,\n제가 혼자 하는 이사다 보니\n돈을 조금 더 주더라도 믿고 맡길 수 있는 곳에서\n하자는 생각에 견적 받고 바로 계약했죠.\n\n결론부터 말하면, GS에서 하길 잘했어요.\n\n이사 당일 비가 왔는데\n팀장님 포함 남자 직원 4분과 이모님 한 분이 오셨어요.\n비가 와서 걱정했는데 직원분이 5분이나 오셔서\n덕분에 비는 거의 안 맞았어요.\n\n다 한국분이시고 젊은 청년분들이었는데,\n어찌나 손발이 척척 맞게 짐을 싸 주시는지\n깜짝 놀랐어요.\n\n저는 살던 가구며 살림들 거의 다 버리는 경우였는데,\n그것 또한 폐기물 모아 놓는 곳에\n최대한 부피 줄여서 깨끗하게 쌓아 주시더라고요.\n\n이사한 집엔 새 가구가 다 들어오지 않아\n짐을 정리할 수가 없었는데,\n옷 하나하나 개가면서\n넣을 수 있는 곳엔 다 넣어 주시더라고요.\n\n그리고 가장 죄송하고 감사한 점은,\n냉장고 문이 이상해서 AS 요청드렸더니\n싫은 내색 1도 없이 바로 약속 잡고\n시간 내서 와 주셨어요.\n\n근데 문이 이상한 게 아니라\n문짝 선반이 잘못 끼워진 거였어요.ㅠㅠ\n제가 조금만 더 살폈으면\n한 시간 거리 안 오셔도 됐을 텐데ㅜㅜ\n너무 죄송하더라고요.\n\n가시면서도 \"괜찮다, 고쳐서 다행이다\" 하시며 가셨어요.\n\n이 글을 통해 다시 한번 팀장님께\n죄송하고 감사한 마음 전합니다. 🤩\n\n다시 이사한다면 또 이 업체에서 할 것 같아요.\n가족과 친구한테도 권하고 싶은 업체예요.\n이사 업체 고민하시는 강봉원 분 계시면\n저는 GS 추천 드려요.",
  69: "계단 이사는 처음이었어요.\n\n이사 갈 곳을 확정하기 전에 여기에 글을 올리고\n걱정할 만큼, 수백의 돈을 들여도\n이게 사람이 할 수 있는 일일까 했는데,\n결론적으로 수백도 아니었고\n사람이 하는 계단 이사, 너무 잘 끝냈습니다.ㅠ\n\n더운 여름에 4층까지 계단으로\n크고 무거운 양문형 냉장고나 드럼 세탁기 등\n5톤 트럭의 살림살이들을 들고 올라오시는데,\n정말 이 집에서 탈출하고 싶어지더라고요.\n너무 죄송해서 어찌할 바를 모르겠다는 게\n이런 거구나 하고ㅠㅠ\n\n이 자국을 보고\n\"밖에 비가 오나요?\" 하고 물었습니다.\n\n직원분들의 갈비뼈 엑스레이 사진마냥\n찍힌 땀 자국이었어요.ㅠㅠ\n얼마나 덥고 힘드신지,\n땀에 막 젖어 녹아내리시는데\n정말 고생하셨습니다.ㅜㅜ\n\n이사가 끝나고 엄청 힘든 하루를 보내셔서\n그냥 빨리 돌아가고 싶으실 텐데,\n시멘트 벽은 전동드릴도 안 되는 벽이라\n벽걸이 시계를 원래 있던 못걸이에 걸어두려 했거든요.\n\n근데 먼저 다른 곳에 걸어주시겠다며\n다들 밖에서 못 하나를 저렇게 열심히 찾고 계셨어요.ㅠ\n저는 가실 준비하느라 공구 정리 중인 줄 알았는데,\n못 하나를 다 같이 저렇게. 😭\n\n정말정말 감사한 이사였습니다.\n\n이분들 4층까지 땀을 비 오듯 흘려가며 일하시는데,\n어떻게 인상 한 번 쓰지 않고\n땀을 뚝뚝 흘려가면서도\n이게 어떻겠냐며 손 한 번 더 가더라도\n더 해주려 하시고, 웃어가며 일을 할 수 있는지.\n\n정말 대단한 팀을 만났습니다.\n\n단순히 계단 이사를 해서가 아니라,\n이사 내내 이분들의 표정이나 행동에서\n원래도 정말 최선을 다하는 팀이라는 생각이 들어서\n꼭 후기를 남기고 싶었어요. 😁",
  68: "10년 동안 저희 집 4번,\n시어머니 집 2번 이사를 경험했지요.\n참 많이도 다녔네요. 😂\n이번엔 시어머니 이사랍니다. 😅\n\n솔직히 매번 다른 이사 업체를 경험해본 결과,\n만족도는 딱 5분, 5분만 보면 나오더라고요.\n\n일기예보엔 보이지 않았던 비가\n짐 싣는 딱 그 시간에 어찌나 쏟아지던지.\n그리고 이사 갈 곳이 골목 안에 있어서\n큰 차가 들어갈 수 없었기에\n작은 차로 몇 번을 날라야 했답니다.\n악조건 중에 악조건이죠. 🙄\n\n헌데 직원분 어느 누구 하나 인상 쓰시는 분 없었고,\n맡은 자리의 일을 묵묵히 해주시더라고요.\n\n모든 짐을 정리한 후에 돌아가시기 전에도\n몇 번이고 도움 주시려는 모습에 감동받았습니다. ^^\n\n저희 신랑 왈,\n\"지금껏 봐왔던 분들 중에 최고\"라 하더라고요. 😊\n\n혹여나 이사 계획이 또 생긴다면\n다시 만나 뵐 의사 충분합니다. ♡♡♡",
  67: "4년 전 이용하고 좋았던 기억에 또 이용했어요.\n사장님이 역시 너무나 센스 있으시고\n일 처리 대박입니다.\n\n찾으면 저렴한 곳도 있겠지만,\n다른 곳 알아보지도 않고\n사장님께 다시 연락드렸어요. ^^\n\n이사 당일 챙겨주신 것들을 정리하면:\n\n하나, 베란다 스피드랙을 챙겨주셨어요.\n두고 왔으면 짐이랑 같이 잘 뻔했어요.\n\n둘, 싱크대 관련 용품이 규격 안 맞을 것 같다며\n두고 가자고 하셨어요. 역시 사장님 눈썰미.\n\n셋, 새 책상이 먼저 들어와 설치 중이었는데,\n보시고는 침대랑 두기 어려울 것 같다 하셨어요.\n책상 사이즈 미스로 반품 중이에요.ㅠ\n\n등등 더 있지만,\n하나하나 세심하게 챙겨주셨어요.\n\n이사 당일날 저는 너무 바빠서\n신랑만 현장에 두고 왔다 갔다 했는데,\n가구 배치도 용도에 맞게 알아서 해주셨어요.\n그저 감동입니다.\n\n이제야 정리가 어느 정도 끝나서 후기 작성하네요.\n감사해요, 돈쭐나세요 사장님. ^^",
  66: "엄마네도 오빠네도 이사가 잡혀서\n이삿짐 센터를 알아봐야 했어요.\n\n강봉원 추천 맛집들도 거의 성공이기도 하고,\nGS 후기를 봐도 거의 칭찬만 가득해서\n일단 견적 요청드렸어요.\n팀장님과 대화하면서는 더욱더 믿음이 가서\n바로 계약했어요.\n\n저희는 짐 보관까지 해야 해서\n정말 믿음이 중요했거든요.\n근데 이삿날 그 믿음은\n꼼꼼함과 확실한 일 처리로 보여주셨어요.\n\n팀장님과 직원분들 모두 너무 잘해주시고,\n전문가 포스.\n빠르지만 확실하고,\n조용하지만 친절하게.\n요청 사항 하나하나 다 들어주시고.\n\n이사 많이 해봤는데\n이렇게 완벽하게 해주시는 분들 정말 처음이었어요.\n\n다른 곳 견적 따위 필요 없습니다.\n후회 마시고 그냥 GS이사몰에서 하세요.\n\n저도 올해에 또 이사해야 하는데\n센터는 이제 고민 안 해도 돼서 너무 행복해요.",
  65: "언제나 그렇듯 저의 한국 살이는\n강봉원과 함께입니다. ^^\n\n이사 일정 잡히자마자 GS에 문의했고\n견적 일정 잡았습니다.\n\n남편은 강봉원 회원이 아니라서\n다른 데도 견적 일정 하나 잡아뒀더라고요.\n거기도 리뷰 좋고 좋은 데라고 하더라고요.\n그러십시다 하고 두 군데 견적 봤는데,\n\n일단 가격이 비슷했는데,\n타 이사 업체는 에어컨 이동 비용에\n실외기 설치 비용이 별도였고,\n세탁기 이동이 문제였는데\n거기에 또 얼마인지 모르는 추가가 있다고만 하셨어요.\n못 하면 그냥 두고 간다고 하고요.\n\n이 두 가지가 그 업체를 지워버린 계기였어요.\n\n맡겨드리고 저는 일을 갔다 오니,\n이사한 집 아닌 것처럼\n바로 생활 가능한 집이 되어있었네요. ^^\n\n이모님께서 옷 정리며 냉장고 정리까지\n너무 잘 해주셔서 너무너무 좋았고,\n느꼈던 것은 하나하나가 섬세한 케어였다는 점이에요.\n\n힘든 일이라 그냥 넘길 수 있고,\n귀찮으면 무시할 수 있는 부분들까지\n참 친절하게 잘 해주셔서 좋았어요.\n\n좋은 선택이었다고,\n저도 남편도 매우 만족하고 있습니다.",
  64: "저번 주 금요일, 10년 만에 이사라\n걱정 한가득이었는데,\nGS이사로 결정하기를 정말 잘했다는 생각밖에 안 드네요.\n\n신경 쓸 거 하나 없이 알아서 척척.\n작은 방 문이 작아 책상을 넣기 힘들었는데도\n어떻게 요리조리 넣어주셨어요.\n\n나중에 이사 갈 때 다시 어떻게 빼요?\nGS이사 또 불러야죠. ㅋㅋ\n\n팀웍 진짜 좋으셨고,\n뚝딱이 아저씨처럼 뭐든 다 뚝딱 처리해주셨어요.\n\n김치냉장고 높이 안 맞는 것도 받침대로 맞춰주시고,\n미처 저희가 준비하지 못한 것까지\nGS이사몰에서 다 준비하고 계셨더라고요. 갬동ㅠㅠ\n\n실외기가 진짜 크고 무거운데\n그걸 혼자서 옮기시는 거 보고 깜짝 놀랐어요.\n와, 정말 힘이 장사세요.\n\n이사하고 돈이 1도 안 아까웠고,\n가족에게 추천하고 싶은 업체였어요.\n다음에 이사할 때도 무조건 GS예요.\n\n후기 잘 안 쓰는 1인인데,\n정말 너무너무 감사해서 글 씁니다.\n사장님 번창하세요. ^^",
  63: "제가 일을 하다 보니 평일은 저녁에만\n방문 견적을 받을 수 있었는데,\n다른 플랫폼 통해 소개받은 업체에서는\n\"제가 없어도 되니 아무라도 있는 오전오후 시간을\n알려달라\"고 하더라고요.\n\n근데 GS이사몰은 제가 있을 때 견적 보시는 게 좋다며\n제 시간을 맞춰주셨어요.\n\n이번에 해보니,\n제대로 견적 받으려면 옮길 것, 옮기지 않을 것을\n구분해야 해서 \"제가 없어도 된다\"는 업체는\n거르는 게 좋겠다고 생각했답니다.\n\n정확한 견적과 이사 당일 매니저님이\n직접 통솔하신다고 해서 GS이사몰로 결정.\n\n이사 당일 7시 50분쯤 와주셨고,\n서로 호흡이 척척 잘 맞으셔서\n분위기도 좋고 일도 명확하고 깔끔하게 진행되더라고요.\n\n저희 집에 잔짐이 엄청 많았는데 꼼꼼히 챙겨주시고,\n큰 가구들은 파손되지 않도록 세심하게 운반해 주셨어요.\n\n이전 이사 때 침대며 장롱이며 다 망가져서\n\"포장이사가 원래 이렇구나\" 했는데,\n이번엔 정말 하나도 파손되지 않고 옮겨져서\n신기하고 감사했답니다.\n\n칭찬 잘 안 하는 대문자 T 남편이\n여러 번 이사하면서 경험한 업체 중 최고라며\n극찬을 아끼지 않았네요. ㅎㅎㅎ\n\nGS이사몰 선택한 제 자신 칭찬하며,ㅎㅎ\n주변에 이사한다고 하면 무조건 추천합니다.",
  62: "오늘 이사했어요.\n이사로 녹초인데 글 작성 중인 거면\n얼마나 화나는지 아시겠죠. 너무 화나요.\n\n처음엔 다른 이사 업체들보다 가격이 있는 편이라\n살짝 고민했지만,\n돈 더 내야 할 것 같아요. 그래서 화나요.\n기술에 비해 너무 싸.\n\n신혼 가전이라서 워시타워, 시스템 행거 등등,\n다른 이사 업체에서는\n\"LG에 맡기시는 게 편해요\"라는\n애매한 답변만 들었어요.\nLG에 맡기면 최소 100만 원 추가였어요.ㅠㅠ\n\n\"자신 있게 다 할 수 있습니다\"라고\n말해준 곳은 GS이사몰 한 곳뿐입니다.\n\n이사할 때도 직원 한 분 한 분에게\n\"비 오니까 잘 싸달라\"고 말씀해주시더라고요.\n\n제일 좋은 건,\n이사 업체 중 팀 분들 모두 제일 화목하고\n재미있게 일하시는 것 같았어요. ㅎㅎ\n\n너무 완벽해. 진짜.\n내 인생 최고의 이사 업체입니다.\n\n백만 원 더 비싸도 다음에도 꼭 여기서 할 거예요.\n\n안 좋은 후기가 몇 개 올라왔길래 봤는데,\n제가 오늘 직접 내돈내산 해보니\n말도 안 되는 후기인 것 같아서\n타 업체인가라는 생각도 드네요.\n직접 해보시면 말도 안 되는 글이다 라고 느끼실 거예요. 🥲\n\n고민할 시간에 예약하세요. 예약도 힘들어요.\n\n선택 장애인 저에게\n풍수지리로 가구 배치 착착 정해주는\n사장님께 잠깐 반했어요. 🤣",
  61: "비 예보가 있어 이사 전부터 걱정이 많았습니다.\n\n하지만 그럴 때마다 강봉원의 후기와\n견적 내며 믿음을 주시던 팀장님을 떠올리며\n마인드 컨트롤을 했습니다.\n\n전세가 안 나가다가 갑자기 나가는 바람에\n촉박한 일정으로 문의드렸고,\n팀장님께서 견적 내시면서 굉장히 저를 안심시켜 주셨거든요.\n\n저희가 인테리어를 한 집에 들어가는 상황이라\n더욱 걱정이 많았는데,\n팀장님께서 특별히 조심하시겠다고 신경 써 주시겠다고 하셨고,\n집 안 가전과 가구들을 보시면서\n특별히 신경 쓸 가구들을 미리 말씀해 주시는 것을 보고\n다른 업체와 비교도 하지 않고 바로 계약을 했습니다.\n\n팀장님의 지휘와 관리가 빛났다고 생각합니다.\n팀원분들께 계속\n\"비 오니까 한 번 더 싸주세요,\n한 번 더 감싸 주세요\"를 외치시면서\n세심하게 관리해 주셨습니다.\n\n걱정했던 새 집도\n거의 손상 없이 잘 지켜주시며 이사 진행해 주셨어요.\n\n인형장에 인형이 굉장히 많았는데,\n그 인형도 이사 전과 거의 똑같이 배치해 주고 가셨어요. ㅎㅎ\n\n모든 짐이 이전 집과 같은 공간에 놓여져 있어서,\n아직 정리가 덜 된 상태에서도\n손쉽게 물건을 찾을 수 있어 너무 감사합니다.\n\n이사 업체 때문에 고민이 많으신 분들이라면,\n팀장님께 맡기시는 순간 안심하게 되실 거예요.",
  58: "12월 초에 이사하고 이제서야 후기를 남기네요.\n\n리모델링을 결정하고\n3개월을 지낼 단기임대집을 구하느라\n이사 업체는 알아볼 시간도 촉박했어요.\n정신없이 날짜는 가고,\n이사 업체를 알아봐야 하는데\n어떤 곳을 선택해야 할지 결정을 못 내리고 있었죠.\n\n그런데 강봉원에서 많은 분들이 추천하신 걸 믿고,\n다른 곳은 견적도 안 보고\n대표님이 방문 견적 내러 오셨을 때 바로 계약했어요.\n\n저희는 이사를 두 번 해야 했는데요.\n\n8월 말 첫 번째 이사는 비 오는 날이었는데,\n팀원분들이 빠르게 척척척 짐을 싸시고 옮기시는 게\n역시 전문가들이라 센스가 좋으시더라고요.\n\n리모델링을 마치고 12월 초,\n두 번째 이사날에 다시 팀원분들과 주방 이모님을 뵈었어요.\n비가 많이 오던 날 이사했던 걸 기억하시더라고요.\n\n리모델링한 집으로 옮길 때도\n집에 손상 안 가게 꼼꼼히 옮겨주셨고,\n세탁기 연결도 대표님이 물 안 새게 직접 해주셨고,\n가구 수평도 잘 맞춰주셨어요.\n\n두 번 이사를 하면서 두 번 다 만족했구요,\n강봉원에서 많은 분들이 추천하신 이유가 있더라고요.\n다음에 동생이 이사할 때도 여기서 한다고 하네요. ㅎㅎ",
  57: "이사한 지 3주 되어가네요.\n이제야 정리가 마무리되어가서 후기 올려요.\n\n강봉원에서 유명한 GS이사몰에 견적 신청하고,\n다른 데는 견적 받아보지도 않고\n믿고 맡겨주시라는 사장님 말씀에 바로 결정했어요.\n\n역시나 결과도 대만족입니다.\n남편이 이런 이사센터 처음 본다고,\n완벽하게 해주셨다고 하네요.\n\n가구, 가전 손상 없이 수평도 완벽히 맞춰주셨고,\n저희 집 침대는 몇 번을 조립 풀고 다시 조립해서\n나사도 분실하고 상태가 안 좋아 AS 부른 상태였는데,\n잘 조립해보시겠다며 튼튼하게 해주셨어요.\n덕분에 AS 비용도 아끼고, 너무 감사했습니다.\n\n팀원분들 너무 친절하시고,\n하나하나 다 상의해주시며 같이 결정했어요.\n\n번창하세요. ^^",
  56: "며칠 전 GS이사몰 통해서 이사를 했습니다.\n\n그 전날까지 아무것도 준비를 못했을 정도로\n넋 놓고 있었는데,\n그날 아침 약속 시간보다 일찍 오셔서\n미리 준비하고 대기하고 계시더라고요.\n\n이전 집에서의 짐도 후다닥 2시간 반 만에 정리 완료.\n\"알아서 딱 하시겠다\"는 사장님 말씀에\n저희는 그냥 차 안에 있었는데,\n올라가 보니 어느새 다 말끔히 정리해주셨더라고요.\n\n심지어 가구를 들어냈더니 먼지가 진짜 많았는데,\n그걸 다 쓸어주시고 닦아주시고ㅠ\n\n저희 집이 LH 임대였어서\n청소하고 가라고 관리인분이 오셔서 이야기했는데,\n저희보다 먼저 이모님께서\n\"저희가 하고 갈게요\" 하시는데ㅠ 넘 감동이었어요.\n\n엄마랑 통화하는데\n이전 집을 청소해주는 업체는 없다며ㅠㅠ\n그 말에 더 감동했습니다.\n\n이렇게 환상의 팀웍을 가진 이사 업체는 처음이었어요.\n젊은 분들로 구성되어 있어서 더 좋더라고요.\n저희 집이 슬라이딩 장이라 조립이 필요했는데,\n그것도 사장님께서 뚝딱 다 해놓으셨더라니깐요. ㅎㅎ\n\n진짜 GS이사몰 강추입니다.\n이사하면서 이렇게 만족해보긴 처음이네요.",
  55: "이번 주 화요일에 창동에서 수원으로 이사하며\nGS이사몰을 이용한 후기 적습니다.\n\n이용하고 느낀 점은,\n정말 책임감이 넘친다는 거였어요.\n\n처음 견적 받은 곳은 3.5톤이면 된다 하셨고,\n2.5톤+3톤을 말씀하신 곳도 있었거든요.\n그런데 GS 사장님은 5톤으로 해야 한다고 하시더라고요.\n\n이삿날 짐을 다 싸고 나니\n5톤 트럭이 가득 들어갔어요. ㅋㅋ\n사장님이 정말 정확하시더라고요.\n\n제가 놀란 건 책장 정리였어요.\n레벨별, 영역별로 정리해놨었는데,\n이사하면 당연히 섞일 줄 알았거든요.\n그런데 그게 그대로 꽂혀 있는 거예요.\n\n그리고 조카가 부엌 벽에 붙여놓은 강아지 종이가 있었는데,\n그것도 가져오셔서 똑같이 부엌 벽에 붙여놓으시더라고요. ㅋㅋㅋ\n그런 디테일에 정말 놀랐어요.\n\n워낙 꼼꼼하게 해주셔서 그런지,\n뭔가가 안 보일 때 \"이사하다 사라진 거 아냐\" 하는 의심보다\n\"분명 어딘가에 있을 거야\"라고 생각하게 되더라고요. ㅎㅎ\n\n그렇게 믿음을 주신 덕분에 넘 감사히 이사 잘 했습니다.",
  52: "이사를 앞두고 이사 업체는\n강봉원의 픽인 GS이사로 굳혀져 있었죠.\n\n태풍 소식에ㅠㅠ\n사장님이 전날 전화하셔서\n조금 일찍 빼고 일찍 들어가 보자고 하셨어요.\n오케이 하고, 정말 일찍 오셨어요.\n비는 내리기 시작했고.\n\n근데 이거 뭔가요,\n오신 분들이 너무 다 친절하심.\n뵌 지 1분 만에 느꼈어요.\n보통 이사 업체는 별로였거든요.\n무뚝뚝에 거친 행동들.\n\n그런데 달라요.\n그게 1분 만에 느껴져서 안심되고,\n다행이다 싶어서인지 눈물 날 뻔 했어요. ㅎㅎ\n\n집에 작은 어항이 하나 있었는데,\n어쩌죠 물으니 이모님께서\n오실 때 소중히 품에 안고 오셨어요.\n이것 때문에 아들이 \"이모 최고\"라고 했답니다. ㅋㅋㅋ\n\n이사하는 집에 도착하고\n사장님이 안 보이셔서 방에 들어가봤더니,\n이불 낱장 하나하나, 베개커버 한 장 한 장을\n세심히 아기 다루듯 개서 넣고 계셨어요.\n\n오모나, 전 여기서 그냥 끝을 봐 버렸죠.\n지금도 눈물 날 것 같아요, 왜ㅜㅜ\n\n비용에 떨떠름했던 남편은\n모든 이사가 끝난 뒤 저에게 한 마디 했어요.\n\"이사 업체 하나는 진짜 잘 한 것 같다\"고.",
  51: "견적을 4군데 정도 받았었는데,\n고민하다가 후기가 좋아서\n강봉원을 믿어보자 하고 예약했어요.\n\n결과적으로 대만족했습니다. ㅎㅎ\n\n뭐든 다 하실 수 있다고 긍정적으로 말씀해주시는\n팀장님 말씀대로,\n현재까지 가전, 가구 이사 중 특별한 하자 없이 잘 쓰고 있어요.\n\n다들 젊으시고 센스 있으셔서 뚝딱 하시더라고요. 최고!\n\n주방도 이모님께서 정리해주신 대로 거의 쓰고 있어요.\n적재적소에 잘 정리해주셔서 감사합니다. ^^\n\n저희가 방에 코너장이 있었는데,\n스위치 위치만 고려해서 배치를 잡았었거든요.\n그런데 아래 콘센트 위치까지 고려해서\n센스 있고 깔끔하게 고정해주셨어요.\n하나도 그냥 넘어가는 게 없이\n내 집처럼 고민해주셔서 감사해요.\n\n좋은 후기가 괜히 있는 게 아니었네요.\n강봉원 후기 믿어보세요. ㅎㅎ",
  49: "친정 부모님이 21년 만에 이사를 하셔야 해서,\n카페에서 이사 관련 글들 검색해보고\n강봉원 제휴 업체인 GS이사몰에 문의했어요.\n\n부모님 집 짐이 10톤이나 되었다는. ㅋㅋ\n\n사장님께서 짐 버릴 것들 꼭 다 버려주셔야 한다고,\n약속 지켜주셔야 한다고 하셔서\n걱정 마시라 하고 바로 계약했어요.\n\n이삿날 일하시는 분들이 알아서 척척척.\n역할 분담이 아주 잘 나눠져 있어서\n팀원들끼리 합이 잘 맞아보였어요.\n\n아일랜드 식탁을 새로 사서 놨는데,\n냉장고 문 열 때 식탁 모서리에 부딪힐 것 같다고\n뽁뽁이로 미리 모서리를 보호시켜주시고,\n나중에 다이소에서 모서리 보호대 사서 붙이라고 하셨어요.\n\n또 감동이었어요.\n\n부모님께서도 일 너무 잘하신다고,\n너무 마음에 드셨다고 좋아하셨어요.\n\n너무 만족해서 이삿날 저녁에 식당 가서 밥 먹었는데,\n이사 업체가 너무 좋았다는 얘기를 신나게 나누니까\n서빙하시던 식당 직원분이\n어디 이사 업체인지 알려달라고 하셔서\nGS이사몰 번호 알려드렸어요. ㅋㅋ",
  48: "이사 경험도 별로 없고 아는 것도 없어서\n평소 눈팅만 하던 강봉원 카페 보고\nGS이사몰과 계약했어요.\n\n결론은 너무 만족스럽습니다.\n\n처음 견적 받을 때 사장님이 군더더기 없이\n깔끔하게 말씀해주셔서 믿음직스러웠고,\n\n저희가 이사 일정을 변경하기도 하고,\n처음 짐 뺄 때 견적보다 용량 초과도 됐었는데\n다 맞춰주셔서 너무 감사했어요.\n\n보관 이사는 처음이라 엄청 걱정했었는데,\n가구, 가전 손상 없이 잘 도착했구요.\n\n무엇보다 이사 팀 분위기가\n화기애애하고 좋아보여서\n그 점이 참 마음에 들었어요.\n\n인테리어 후 이사라서 새집 손상 안 되게\n저희보다 더 신경써서 해주신 점, 감사합니다.\n강봉원에도 넘 감사드려요.\n\n저처럼 이사 경험 부족한 분,\n보관 이사 처음이신 분,\n걱정 없이 맡기셔도 만족하실 거예요.",
  46: "서울 기온 영하 10도,\n체감 기온 영하 14도. 😵\n\n눈이 안 오는 게 어디냐 위안 삼으며 이사 시작했어요.\n\n사다리차는 약속 시간보다 일찍 오셔서 자리 잡아주셨고,\n한 팀으로 움직이신다는\nGS이사몰 전문가님들이 오셔서\n냉장고, 세탁기, TV, 모니터 등등을\n정말 꼼꼼히 포장해주시고 옮겨주셨어요.\n\n같은 구조로 이사 가는 거라\n\"Ctrl+C, Ctrl+V로 복붙 이사를 원해요\"라고 말씀드렸는데,\n오전에 오셔서 쓱 보시더니\n바로 똑같이 넣어주시더라고요. 넘 신기했어요.\n\n주방도 제가 손댈 곳 거의 없이 정리 잘해주셨고,\n날씨가 추우니까 화분이랑 TV도 얼 수 있다며\n미리 옮겨주시더라고요.\n\n오신 분들도 서로 웃으시며\n화내거나 찡그리시는 거 하나 없이 일하셔서\n보는 저도 기분이 좋았어요. 😄\n\n여러 번 사무실 이사, 가정집 이사를 해본\n저희 가족도 이렇게 잘하는 이사 팀은\n드물다며 칭찬을 아끼지 않았어요.\n\n가장 큰 이사를 아주 깔끔하게 끝마치게 되어 너무 기분 좋아요.\n강추합니다!",
  44: "이사가 낯설고 익숙치 않아서\n이사 업체를 선정하는 것부터가 큰 고민이었어요.\n종일 인터넷을 뒤지기도 하고,\n견적을 대여섯 군데 받기도 하고,\n막판엔 주변에 수소문까지 해가며.\n\n여자들은 자기 살림을 누구 손에 맡기는 게\n여간 까다롭지 않잖아요.\n그런데도 마음에 들지 않아서 차일피일 미루다 보니\n허걱, 7월이 되었네요.\n\n여러 군데 더 알아봤는데,\n역시 제일 진솔하게 상담 받은 곳도 GS이사몰이었어요.\n\n세상에나, 이분들 번개불에 콩 볶아 드실 분들이세요.\n도착한 지 1시간 만에 짐을 거의 내리셔서\n셀프 입주 청소는 미완에 그쳤네요.\n\n이사를 많이 해보셔서\n가구 배치나 집 안 곳곳 손 볼 곳도\n솔선수범해서 찾아주셨어요.\n\n일도 얼마나 잘하시는지,\n이사를 많이 다녀본 주부 9단 동생도\n쏙 반해서 연락처를 물어오더군요.\n\n더운 날씨에도 쉬지 않고 열심히 해주셔서 감동받았어요.\n\n이번이 첫 거래라 미심쩍었다면,\n다음 이사는 꼭 GS이사몰과 할 거예요.",
  40: "결혼하고 전세 계약이 만료되어 이사를 가야 하는데,\n신혼 가구들이 너무 새것들이라서 걱정이 많았어요.\n\n이사 비용도 비용이지만,\n비싼 곳인데도 그 가격만큼 못 한다는 후기를 보고\n업체를 많이 알아봤어요.\n\n결국 이 카페에서 GS이사몰을 알게 됐고,\n상담 받고 사장님의 큰 자부심에\n바로 계약해서 진행했습니다.\n\n아기가 어려서 남편이 출근한 시간에는\n혼자 정리가 어려웠는데,\n협력 업체 정리 도와주시는 분이 다음날 오셔서\n이사 2일 만에 다 끝냈습니다.\n\n특히나 사장님, 이것저것 저희가 요청한 것들이 있었는데\n너무나 친절하게 다 들어주시고 해주셨어요.\n\n첫 이사였는데 카페 덕분에 GS이사몰을 알게 됐고,\n남편도 200% 만족스러운 이사였어요.\n\n다음에 또 이사해도 GS이사몰로 할 겁니다. ㅎㅎ",
  39: "카페에서 칭찬 후기 글 보고\n연락처 받아 예약 잡고\n오늘 이사 마친 찐후기입니다. ^^\n\n참고로 이사를 많이 해봐서\n근처 단골 이사짐도 있었는데,\n믿음 가는 추천 글 보고\n비교 견적 후 결정했습니다.\n\n이사짐이라는 게 다 사람이 하는 일인지라\n팀원에 따라 불만족스러울 수도 있어서\n당일이 되면 항상 긴장되는 건 어쩔 수 없는 듯해요.\n\n이름만 대면 다 알 수 있는 몇몇 곳도\n\"비싼 견적만큼 뭔가가 다르겠지\" 해봤지만,\n결론은 다 똑같다였습니다.\n\n오늘은 가족 같은 즐거운 분위기로\n일사천리로 끝까지 웃음 잃지 않으시고\n꼼꼼하게 챙겨주셔서 감사했습니다.\n\n꼼꼼함이 진심이셔서 감동했습니다. ^^\n\n대충이란 건 없으시고,\n가능한 한 고객을 위한 최선의 선택을\n먼저 생각해 주시고 해주셔서,\n팀장님 이하 팀원분들 모두 감사했습니다.\n강력 추천드립니다.",
  38: "카페에는 글 처음 올리는데,\n이웃님들 덕분에 좋은 경험 하게 되어\n감사한 마음에 글 올려요. ^^\n\nGS이사몰+정리가 좋다는 다수의 후기 보고\n다른 업체 비교 견적은 패스하고 ㅋ\n단독 견적 내고 결정했어요. ㅋ\n\n이사 당일 약간의 비가 내려서\n이사 과정이 힘들 수도 있겠다 생각했지만,\n노련하신 GS이사몰 팀과\n젊은 대표님, 매니저님이 빠르고 꼼꼼하게 정리하시는 거 보고\n감탄 + GS 선택한 내 자신 뿌듯. ㅋ\n\n짐들에 묻은 먼지들도 하나하나 털어서 포장해주시고,\n유리 제품들 깨지지 않게 주의 또 주의해주시고.\n\n이사짐 풀고 가구 배치하면서\n제가 여러 번 바꾸게 됐거든요.ㅠ\n그때마다 같이 고민해주시고,\n방을 최대한 넓게 쓸 수 있도록 신경써주시고,\n원하는 결과물 나올 때까지 옮겨주셔서\n감사하고 또 죄송했어요.ㅠ\n\n다음 날 협력 업체 정리 이모님 도움을 받았어요.\n\n이번에 장롱을 폐기하면서\n오픈형 옷장에 이불이랑 옷을 같이 보관해야 했는데,\n처음에 제가 정리한 방법보다\n이모님 손이 닿으니\n순간 마법을 부리신 것처럼 공간이 새로 생겼어요. ㅎ\n이래서 정리 전문가구나 싶더라고요.\n\n이웃님들의 귀한 정보로\n좋은 분들 만나서 한결 수월한 이사 됐어요. ㅎ",
  33: "이래저래 일이 좀 있어서 이사가 힘들었어요.\n집 계약도 꼬이고,\n이것저것 취소해야 할 것도 많았고..\n\n미리 날짜까지 지정해서 계약해둔 상황이라\n날짜 변경도 무리였고,\n죄송한 상황에 저희 쪽 힘든 거\n자세히 말씀드리지 못했는데,\n\"힘드신 상황인 것 같다며,\n최대한 맞춰서 도와드릴 수 있으면 좋겠다\"고\n감사하게도 먼저 말씀해 주시고\n계속 알아봐 주시더라고요.\n\n원래 견적과 다르게 언덕에 연식 있는 빌라로\n이사를 오게 되었는데,\n길도 험하고 짐도 워낙 많아서\n5톤 트럭 주차도 힘들고 사다리도 힘들고,\n이사 후에 도배까지 껴있어서\n정리를 해주실 수조차 없는 상황이었어요.\n\n정말 너무너무너무 고생을 많이 하셨어요..ㅜㅜ\n\n그 와중에도 정신 못 차리고 있는 저희한테\n\"도배하고 나서 정리하기 최대한 편하게\n해놓고 가겠다\"고 붙잡고 설명해주시고.\n나중에 정리하면서 보니\n정말 신경써주신 게 느껴지더라고요.\n\n\"괜찮다, 저희가 원래 하는 일이다.\n정리를 못 해주고 가서 그게 너무 걸린다.\n몰아서 정리하려 하면 병나니까\n차근차근 천천히 정리해야 한다.\"\n\n말씀해 주시고,\n끝나고 가시는 길까지 계속 염려해 주셨어요.\n\n가실 때 가시는 트럭 뒤로\n얼마나 인사를 했는지 몰라요. ^^;;\n\n이건 뭐, 후기도 아니고 그저 감사 인사예요.\n\n너무 고생하셔서 염치없지만,\n다음 저희 이사 때 꼭 다시 와주시기로 하신 거\n잊지 않으셨죠..?ㅡㅜ\n\n덕분에 몸도 마음도 힘들었던 상황에서\n이루 말할 수 없이 크게 위안받았어요.\n정말 감사했습니다!!",
  32: "찐이 아니면 안 남기는 후기인데......\n정말 이런 업체가 잘됐으면 하는 마음에\n자발적인 후기 남겨봅니다!! ~~~\n\n저는 이사를 결혼 10년 동안 6번을 했습니다.\n추천 받아서도 해보고,\n꼼꼼한 후기 검증을 통해서도 해보고,\n싸다고 하는 곳에서 험상궂게 생긴 외국인들과도 해보고,\n눈 딱 감고 대박 비싼 곳에서도 해봤습니다.\n\n드디어 찐이 나타났습니다!!!!!\n\n가격은 비싸지도 아주 저렴하지도 않습니다.\n비싸다고 좋은 것도 아니고,\n저렴하면 딱 그 정도밖에 안 해줍니다.\n\n이사 견적을 보러 오시는 분이\n직접 이사를 해주셔서 너무 좋았습니다.\n미리 스케일을 딱 보고 가시니\n더 이상의 추가 금액도 요구하지 않습니다.\n\n순간 훈훈한 남자분들이 들어오셔서\n\"과연 힘을 쓰실 수 있을까\" 걱정됐는데...\n힘이 장사이십니다!!!!\n\n너무 친절하시고 꼼꼼하시고,\n이것저것 편하게 부탁드릴 수 있는 분위기여서 좋았어요.\n\n저희 집은 난이도 '상'의 집이었음에도 불구하고\n얼굴 한 번 찌푸리지 않고 최선을 다해주시는 게\n보여서 너무 감사했습니다.\n\n커튼 위치, 거울의 위치, 콘센트 나오는 위치\n하나하나 꼼꼼히 저한테 물어주시고,\n다시 손댈 필요도 없게끔 해주고 가셨습니다.\n\n다른 곳과 비교했을 때 단점을 찾으라면,\n그걸 찾아내는 게 더 힘드네요. ㅋㅋ\n\n앞으로 이사는 GS이사몰 아니면 쳐다도 안 볼랍니다!!\n찐입니다, 찐!!!!",
  29: "7월 초에 이사 업체 7군데 견적 보고,\n4년 전 이사 시 유명 브랜드 업체로 했다가\n마무리 개판으로 인해\n유명 브랜드에 대한 신뢰도가 떨어졌습니다.\n\n카페에서 불만 글을 읽어서 또 고민을 하다,\n혹시나 해서 GS이사몰에 견적을 넣었습니다.\n젊은 사장님이시고, 똑 부러지게 일하실 것 같아서\n막판에 바로 결정하였습니다.\n\n사장님도 오셔서 직원분들과 함께 이사 포장해주셨는데,\n저희 가족 및 일하시는 분들과\n얘기도 많이 나누면서 웃으면서 작업한 게\n인상적이었습니다.\n\n직원분들은 \"다 먼저 놔두세요, 저희가 해드릴게요.\"\n본인들 일로 생각하시고 떠넘기지 않더라고요.\n\nTV, 컴퓨터 등 파손 나면 업체에서\n보상을 해주는 게 당연하지만,\n사장님이 직접 꼼꼼하게 포장하시면서\n\"고장나면 제가 책임집니다\"\n웃으면서 말씀도 해주시고.\n\n직원분들이 본인 집처럼 이사하는 마냥\n해주신다는 느낌을 받았습니다.\n\n직원분께서 걸레를 직접 빨아오셔서\n뒷면까지 꼼꼼하게 닦아주시는 거 보고,\n이런 작은 거 하나에 신경써서\n이사 정리를 해주신 게\n저는 만족도가 높았습니다.\n\n저는 후회가 없었습니다.",
  27: "이사한 지 근 한 달 만에 후기를 올리네요.\n\n저는 이번에 친정 집 리모델링 후,\n원래 살고 있던 곳에서 친정 집으로 들어왔기 때문에\n이사만 3번을 했어요..ㅠ\n\n팀장님이 직접 오셔서 견적 재주시는데,\n친절하게 설명도 잘 해주셔서\n저희 가족 만장일치로 GS이사로 정했습니다!\n\n보관 이사 당일 팀으로 오셔서 착착~ 너무 잘 해주시고,\n저희 부모님도 서비스에 정말 만족했습니다.\n\n특히 벽걸이 TV나 세탁기 등 설치 다 해주시고,\n세탁기는 작동 되는지까지 확인해 주셨어요.\n덕분에 가전 제품 회사의 유료 설치비도 세이브됐습니다.\n\n짐 들어올 때도 필요한 곳에 못도 다 박아주시고,\n선반도 설치해 주시고.\n\n시작부터 마무리까지\n어느 하나 소홀히 하지 않으셔서,\nGS이사 통해 하길 잘했다고\n몇 번이나 생각했어요.",
  26: "강봉원 감사요!!\n덕분에 GS이사몰 알게 돼서 이사 편안히 잘했어요. ~~~\n\n이사가 처음이라 좀 겁이 났어요.\n안 좋은 후기도 많고ㅠ\n견적은 세 군데 받았는데 느낌이 제일 좋으시더라고요.\n무엇보다 제 상황 제일 잘 이해해 주시고요. ~~~\n\n이사 당일 좋았던 점들을 정리하면:\n\n칼같은 시간 준수.\n\n조용하고 평온한 진행.\n시끄럽고 왁자지껄한 이사 생각했었거든요.ㅠㅠ\n\n궁금한 거 친절한 답변.\n힘드실 텐데 진짜 웃으시면서 해주세요.ㅠ\n\n부탁드리면 너무 당연히 해주시는 것.\n\n이사 분위기도 좋고.\n서로 협력도 잘되시는 것 같고\n전혀 큰 소리도 없었어요.\n\n초 감동 부분!!\n새 종이 박스를 사오셨더라고요.ㅠㅠ\n어디서 얻으셨다는 종이박스들도 다 새것.\n\n아참, 냉장고로 바닥이 살짝 찍혔는데,\n충분히 이해할 정도였어요.\n제가 발견했으면 맘 상했을 수도 있었을 텐데,\n팀장님께서 실수하셨다고 미리 말해주셔서\n더 괜찮았어요.\n\n이사가 처음이라 비교 대상이 없었던 건 사실이지만,\n부모님과 이사할 때 생각해보면\n그때에 비해 우아한 이사를 한 것 같아요!!!\n\n신랑도 대만족!! 😊",
  23: "짐은 별로 없었지만 신혼 가구 이사라 걱정돼서\n견적을 여러 군데 받아봤는데,\n카페를 통해 GS이사몰을 알게 됐습니다.\n\n금액보다는 전문성과 신뢰, 성실성이 중요한 것 같았어요.\n\n이사 당일에도 팀장님이 직접 나오시고,\n팀원도 일용직 분들을 순환하는 게 아닌\n고정적으로 한 팀만 구성돼 있다는 점이 맘에 들어서\n계약을 했어요.\n\n아침 8시 되기 전에 오셔서\n이사가 척척 진행되기 시작했어요.\n각자 자신의 역할이 있으신지 호흡이 척척!\n\n전체적인 현장 지휘와 모든 책임을 맡으신 팀장님,\n가구 전문가인 것 같으신 연륜의 내공이\n느껴지는 기사님,\n꼼꼼하고 상냥하신 정리의 달인 주방 이모님,\n젊고 건장한 체력에 인테리어 이사 베테랑 포스가\n느껴지는 성실한 직원분들.\n\n모두 전문적인 스킬로\n포장이 일사천리로 진행되었습니다.\n\n가구 배치도를 미리 그려서 드렸는데\n숙지를 다 하셨는지, 알아서 다 맞게 배치해주시고,\n가구 조립이랑 옷 정리, 책 정리도\n흐트러짐 없이 그대로 해주셨어요.\n\n파손이나 분실 하나 없이 깔끔하게 정리해 주시고,\n이사도 생각보다 빨리 끝났어요.\n\n결과는 대만족!!!\n\n저희 어머님네도 이달 말에 이사하는데,\nGS이사몰에서 합니다!",
  16: "3월 2일 상계주공에서 창신동으로 이사했습니다.\n\n이사가 두 번째였는데,\n첫 번째 이사 때 너무 실망을 해서\n조금 걱정이 되었습니다.\n\n사실 첫 이사 때 GS이사몰에서도 견적을 받았었는데,\n견적 금액이 좀 높은 편이어서 안 했었어요.\n싼 게 비지떡인가 싶기도 했고,\n카페에서 계속 후기 글도 좋아서\n이번엔 GS이사몰로 바로 진행했습니다.\n\n만족한 이유 비교해서 적어볼게요.\n\n하나. 견적받으신 사장님이\n이사날 책임자로 와서 직접 진행.\n(사장이 계약하고, 사장이 와서 이사)\n\n둘. 사장님이 와서 직접 하다 보니\n정해진 매뉴얼대로 꼼꼼하게 진행.\n\n셋. 이사 가는 집에 붙박이장이 있어서\n장롱 처분이 걱정이었는데,\n장롱을 팔아주셨어요.\n\n넷. 에어컨도 기사님 연결해 주셨는데\n저렴하게 잘됐어요.\n\n다섯. 선반 같은 것도 다 달아주셨어요.\n\n여섯. 마지막에 친절하게\n\"더 필요하신 거 없냐, 잘 둘러보라\" 하셨어요.\n\n사장님 덕분에 이사날이 편안했습니다.\n담에도 사업하시고 계시면 또 뵐게요. ~^^",
  10: "저는 10월 12일 금요일날 이사했어요.\n\n여기 GS이사몰 하기 전에 5군데 견적 봤었는데,\n여기 택한 이유는 젊은 사장님이 약속하신 요소와\n자신 있게 잘하신다는 말씀에,\n다른 곳보다 조금 더 비싸도\n걱정 없이 잘 하자는 마음에 계약했어요. ㅋ\n\n저희 아버지 사무실 이사도 여기로 계약했구요. ㅋ\n\n좋았던 점들을 정리하면:\n\n하나. 시간 & 차량.\n주차 문제로 골치 아픈 저희 예전 집 주변을\n주차 10분 전에 일찍 오셔서 차량 정리해주셨어요.\n\n둘. 빠짐없이 깔끔하게.\n집에 있는 종이 하나라도 버리지 않으시고\n싹 다 잘 가져오셔서 분실물 하나도 없었어요.\n\n셋. 가구 배치 & 기스 없음.\n경험이 많으셔서 그런지 척척 잘 배치해주셨어요.\n\n넷. 주방 정리.\n이모님이 동선에 맞게 그릇이나 소스 같은 것도\n넘 잘해주셔서, 이사하고도 따로 힘들게 하지 않았어요.\n\n다섯. 팀워크.\n척척척 손발 잘 맞으셔서 이사 시간도 단축.\n아버지 사무실 이사도 아버지가 인정하셨어요. ㅋㅋ\n\n여섯. 다음에도 또.\n이번 집 전세 또 끝나면 여기서 다시 할 거예요.\n어머니 부동산 하시는 데도 소문내신다고 할 정도로\n넘 맘에 들었어요.",
  7: "이사한 지 좀 지났는데,\n바삐 지내다가 이제야 후기 남겨요.\n\n전세살이 하다 보니\n4년 지나서 이사, 또 2년 후 이사,\n바로 1년 후 이사를 연달아 했더랬죠.\n\n처음엔 견적 보러 오는 분들 말만 믿고\n비싼 곳이면 엄청 잘하는 줄 알고\n돈 더 주고도 실망.\n\n다음엔 이삿날에 사람 부족하다고\n맘대로 안 보내고,\n잔짐 많은 1층인데 사람 덜 데려와 놓고\n마무리도 안 하고 가버리고.\n\n마지막엔 그냥 제일 저렴한 곳으로 했더니\n붙박이장 밑판을 반대로 조립해놓고 가질 않나,\n빨리빨리 쫓기는 듯 급하게 막 해주는 느낌에\n대충 쑤셔박고 가버리시는 듯.ㅜㅠ\n\n이번엔 새 아파트 입주에다가 장거리라\n신경도 많이 쓰이고.\n\n견적 보러 온 키 큰 사장님이\n직접 이사날 오셔서 작업하는 것도 마음에 들었고,\n잔짐이 많고 1층이라 인원 많이 필요하다는 것도\n합리적으로 견적 내주셨어요.\n\n이삿날 당일도 새벽같이 오셔서 짐도 빨리 빼고,\n장거리에 입주 예약 시간도 있었는데\n시간 맞춰주시느라 애써주셨어요.\n\n인원도 5명 맞춰서 딱 와주시고,\n사장님이 직접 오셔서 작업하니\n견적 보러 왔을 때 약속했던 거 잘 지켜주시고,\n요구 사항도 맞춰주시려고 노력하시고.\n\n책이 많은 편인데 책장에 책 정리하실 때도\n최대한 원래 위치로 해주려고 정리해주셨어요.\n다른 때는 늘 대충 꽂아두고 가셔서 거의 다시 했거든요.\n\n신발장은 남자 거 여자 거 나누어서 쫙 해주셨습니다.\n\n최근 4번의 이사 중 제일 편하게 잘 했습니다.\n\n강봉원 카페도 많이 신경 쓰시니,\n하루 이사하고 다시는 안 볼 사람이니\n대충 하시는 팀들보다는\n성의 있게 해주시는 느낌이었어요.\n\n이런 업체가 많아지면 좋겠다는 생각으로\n늦게나마 후기 남깁니다.",
  83: "올해 6월 중순에 GS이사몰 통해서 이사했는데,\n이제서야 글 올리네요. 😅\n\n이사 당일날 처음부터 너무 만족스러웠고,\n다음에도 이사 갈 일 있으면\n꼭 GS이사몰 통해서 하려고 합니다.\n\n대표님 너무 듬직하시고 신뢰를 주셔서 감사해요!\n\n아기 데리고 이사하느라 이사 당일날 정신이 없어서\n사진을 못 찍었네요.ㅠㅠ\n\n날씨 추워지는데 감기 조심하시고,\n다음에 이사할 때 꼭 와주세요. ~~~",
  81: "처제한테 소개받아서\n처음 이사했는데 너무 만족해서,\n다른 곳 견적 보지도 않고\n두 번째 이사도 진행했어요.\n\n팀장님, 대표님 친절하시고\n능력자이신 듯합니다. ㅎㅎ\n\n최대한 잘 맞춰주셔서 감사합니다.\n세탁기 쪽 분해도 뚝딱 해주시고. ㅎㅎ\n\n팀원분들도 신속 정확하게,\n다들 정말 잘해주셨어요.\n감사드립니다. ^^",
  74: "이사한 지 1주일 만에 글을 올립니다.\n\n생애 첫 이사를 보관 이사로 진행했는데요,\n여러 업체에 견적을 받아보고\n최종적으로 GS이사몰로 결정했어요.\n\n결과는 만족스럽습니다.\n\n원래 집이 구축 아파트라\n냉장고를 빼는 데 애를 먹었는데,\n침착하게 잘 해결해 주셨고,\n\n저희 집에서 어머니 집으로\n가구를 옮기고 싶었는데,\n약간의 비용이 발생했지만\n옮겨서 설치까지 완벽하게 해주셨어요.\n\n친절하게 해주셔서 어머니도 엄청 만족하셨어요.\n\n다음에도 이사할 일이 있으면\nGS이사몰에 맡길게요. ^^",
  71: "카페에서 좋은 평가를 받으시는 GS이사몰에\n지난 6월 견적 받고 오늘 이사 완료했습니다.\n\n전출 과정에서는 버릴 것, 가져갈 것을 분류한 후에도\n중간중간 요구 사항 말씀드리면 잘 반영해주셨어요.\n냉장고 문짝 모두 해체해주시고,\n가전 제품 기스 안 나게 조심해주시는 게 눈에 보였습니다.\n\n전입 과정에서는\n신축에서 구축으로 이전이라\n수납 공간이 절대적으로 부족해지는 상황이었는데,\n중간중간 의견을 물어봐주시며 진행해 주셨어요.\n\n아쉬운 점도 솔직하게 적자면,\n정리의 마무리가 조금 아쉽긴 했어요.\n인테리어 한 집인데 보양재로 인한 오염으로\n마루 청소가 빡세질 예정이고요.\n이 점은 감안할 부분이기도 합니다.\n\n장점은 팀원분들이 엄청 친절하고 엄청 성실하셔서,\n중간중간에 요구 사항 말씀드리면\n어떻게든 해주려고 하셨어요.\n팀 분위기가 좋아서\n힘든 이사의 마지막 단계에서 힘을 얻게 됐습니다.\n\n이사를 많이 해본 건 아니지만 만족했고,\n가능하다면 다음 이사도 함께하고자 합니다.",
  70: "저는 이사 갈 때 다른 업체 안 봐요.\n여기서만 예약한답니다.\n\n작은 집에서 크게 넓혀 갈 때마다\nGS이사몰이 늘 함께 해주셨네요. ^^\n\n대가족이라 짐도 많고 날씨도 엄청 더웠는데,\n짜증 한 번 내지 않으시고\n직원분들도 웃으시면서 일해주시는 모습에 감사했습니다. ㅎㅎ\n\n4번째 이용하면서 생각했어요.\n\"5번째가 생길 일 없겠지만,\n5번째도 여기다\"라고.\n\n이사 업체 고민하시는 분들,\n꼭 여기서 하셨으면 좋겠어요. ㅋㅋ\n사장님 돈쭐 내드리고 싶을 정도. 🤭\n\n정리도 꼼꼼히, 청소도 꼼꼼히 해주셨어요.\n\n보관 이사라 리모델링 중 곰팡이는 어쩔 수 없었지만,\n제습제 두 박스를 이사짐에 넣어달라 했는데\n잘 넣어주신 덕에 가구도 멀쩡히 잘 씁니다. ㅎㅎ\n\n이번에도 이사하시느라 고생 많으셨고,\n감사했습니다.",
  60: "어제 이사하였습니다.\n\n아침 일찍 방문하셔서 빠르게 작업해 주셨습니다.\n\n제가 있던 아파트는 2층에 엘리베이터가 서지 않아서\n포장 박스들과 작업 도구들을\n일일이 들고 2층까지 오셔야 했는데,\n일하시는 분들이 불평 한 번 하지 않으셨습니다.\n\n베란다 앞에 나무가 있어서\n베란다로는 짐을 뺄 수가 없어서 현관으로 빼야 했는데,\n오래된 아파트라 문이 작아서\n냉장고가 나올 수 있을지 걱정했는데,\n아이 방을 통해서 냉장고를 안전하게 빼주셨습니다.\n\n이사 들어갈 집에서는\n가구와 짐들을 일일이 물어보시면서 배치해 주셨고,\n중간에 비가 올 때는 짐들이 젖지 않게\n비닐을 씌워서 옮겨주셨습니다.\n\n덕분에 이사 잘 하였습니다. 감사합니다.",
  59: "내 집이 아니라면 2년마다 고민해야 하는 계약 문제.\n2년 전 갱신 계약을 사용했고,\n집주인이 월세로 돌리고 싶다 하여\n급하게 부동산으로 집을 알아보고 계약하고 나니\n두 달도 남지 않았더라는.\n\n이사를 가기로 결정하고\n생각보다 남은 일들이 많았는데,\n그중 제일 큰일이 이사. 🚍\n\n예전에 이사해주었던 업체 리스트를 보다 보니\n마음 상했던 일만 떠올라서,\n강봉원 이사 견적을 받아보고\n너무 과하지 않으면 그냥 진행하려고\n방문 견적을 요청드렸어요.\n\n2월엔 이사가 많아서 이미 마감된 날이 많았는데,\n다행히 저희가 요청한 날이 비어서 예약했습니다.\n\n예전처럼 업체 전부 알아봐도 문제는 있었기에,\n강봉원 제휴 업체라면 믿어보자는 마음으로.",
  54: "글 쓰는 재주가 없어서 잘 못 쓰지만,\n후기는 꼭 써드리고 싶어서 올려봅니다.\n\n이사가 처음이라 여기저기 전화로 견적도 받아보고\n인터넷 견적도 받아봤지만,\n저희 집에 박스가 몇 개가 나올 건지\n저에게 물어보시는데 도저히 감이 안 잡혀서\n전화 끊기만 여러 번, 지쳐갈 때쯤,\n\n강봉원에 지푸라기라도 잡는 심정으로\n검색해보니 GS 후기가 엄청 나더라고요. 😲\n\n반신반의하며 문자 한 통 드려봤는데,\n바로 방문 견적 날짜 잡아주셔서,\n퇴근 시간 때문에 늦은 시간 부탁드렸는데도\n흔쾌히 와주셔서\n매의 눈으로 샤샤삭 훑어보시더니,\n\n\"1톤 트럭이면 되겠습니다.\"\n사이다보다 더 시원한 대답을 들려주셔서\n여기다 싶었어요.\n\n이삿날까지도 잔금 시간이 왔다 갔다 하는 바람에\n걱정이 이만저만이 아니었는데,\n일찍 와주셔서 척척척척 짐 싸주시고,\n옷 방에 블라인드도 설치해주시고.\n\n침대 프레임은 배송만 미리 받아둔 거라\n차마 설치 이야기는 꺼내지도 못했었는데,\n센스 있게 튼튼하게 설치해주고 가셔서\n그날 침대에서 잘 수 있었습니다. 🥹\n\n너무너무 감사드리고요,\n건강하시고 행복하세요.",
  53: "간단명료하게 한 줄 먼저 적자면,\n이사 못 가는 줄 알았는데 갔습니다.\n\n연락이 잘 안 돼서 걱정됐는데,\n아침 일찍 업체에서 와주셔서\n정말 전문가분들답게 척척 해주셨어요.\n\n전쟁터보다 더 난리 난 우리 집.\n지나갈 자리도 없어서 너무 부끄러웠지만,\n미리 싸놓은 박스 먼저 빼주셔서\n움직일 자리 확보하시고 샤샤삭 하시더라고요.\n\n버릴 거 정리하는 법도 조언해주시고,\n설치도 해주시고,\n분리수거할 것도 모아서 내려놔주셨어요.\n\n매니저님도 웃으시며\n\"이삿날 이사 못 가는 줄 알았다\"고. ㅎ\n\n매니저님이 지시하기도 전에\n직원분들이 눈썰미 있게 착착 움직이는 것도\n인상 깊었고요.\n\n주방 이모님이 저희 주방 보고\n\"이게 뭐야\" 하며 기겁하셨다는데. ㅋㅋㅋ 이해합니다.\n\n내년 친언니 이사 갈 때도 이용하려고요.\n암튼 전 추천합니다.",
  50: "8월 말에 이사를 가게 되어서\n3군데 정도 이사 업체를 비교해봤는데,\n강봉원 좋은 후기들도 있고 가장 신뢰가 가서\nGS이사를 선택하게 되었어요.\n\n이사 당일인 오늘,\n8시 전부터 일찍 오셔서 신속하게 짐 잘 싸주셔서\n저희는 한 번씩 가서 확인만 해드렸고,\n생각보다 진짜 빨리 이삿짐을 빼서 이동했어요. ㅎㅎ\n\n이사 간 집에서 짐을 푸는 것도\n정말 깔끔하고 빨랐어요.\n원하는 위치 말씀드리면 잘 놔주셨고,\n행거에 옷 정리, 수납장에 물건들도\n잘 정리해주셨어요. ㅎㅎ\n마지막으로 같이 가져간 커튼까지 잘 설치해주셨답니다.\n\n주방용품 정리하시고 청소해주시는 이모님도\n예쁘게 잘 정리해주시고\n바닥 청소도 해주셔서 좋았어요.\n\n2시 반쯤 이사를 다 마쳤어요.\n보통 이사가 4~5시쯤에나 끝나는 줄 알고 있었는데\n생각보다 일찍 끝나서 너무 좋았구요. 최고 장점. ㅋㅋ\n\n집이 작아져서 수납 공간이 부족한데도\n정리 많이 해주셔서 감사했어요.\n나중에 이사할 때도 여기서 하려고요. ㅎㅎ\n\nGS이사 강추합니다!",
  47: "아, 이사는 역시나 넘나 힘이 드는 일이네요.ㅠ\n\n견적 여기저기 묻지도 않고\n강봉원 넘버원 GS이사에 의뢰했어요.\n\n비 오는 날에 맞춰 이사 예약하고,\n당일날 뵈었는데 고객님 댁 사이청소할 때 뵈었던. ㅎㅎㅎ 🤭\n\n이사 많이 해보았지만 역대급 최고네요.\n사이청소 고객님 댁에서 대기한 적도 많았는데,\n이렇게나 손 안 가도록 꼼꼼하게 디테일하게\n정리해주시는 이사 업체는 처음이에요.\n\n역시는 역쉬, 프리미엄은 프리미엄이네요. 👍👍\n\n지금쯤 짐들과 전쟁하고 있어야 하는데\n대게 먹으러 나왔어요. ㅎ\n퀄리티에 비하면 돈이 하나도 안 아깝고, 최고예요. ^^\n\n2년 뒤 아파트 입주할 때 또 뵙길 바랍니다. 🙏\n넘나 감사해요.",
  45: "오랜만에 강봉원에 글 쓰네요. ^^\n\n3월에 이사하고 누수로\n8월 장기 보관 1달 하고 다시 이사.\n정리 끝내고 후기 올려봐요.\n\n8월 가장 더운 날,\n산 지 3달 된 가구를 보관 이사 맡긴 썰 풀어볼게요.\n\n3월 이사 때 GS에 연락드렸지만\n이사 시즌으로 맡기지 못했고요.ㅜㅜ\n7월 누수로 집을 비워야 해서\n이사를 의뢰했습니다.\n\n풀 인테리어 하고 가구 바꾼 지 3개월이라\n진심 보관 이사가 걱정되었어요.\n따로 남양주에 보관 업체를 알아볼 정도였어요.\n컨테이너는 8월 고온으로 인해 변형이 올 것 같아서\n실내형 보관을 알아봤는데,\n\n견적 때 말씀드리니 흔쾌히 직접 알아보고\n비교해주시겠다 하셨어요.\n\n결국은 사장님 추천 업체인 컨테이너로 했어요. ^^\n제가 벌레와 보안을 생각 못 했었네요.ㅜㅜ\n\n가장 더운 날 보관 이사라\n랩핑을 더 꼼꼼히 해주셨고,\n1달 후 여름 지나고 선선한 가을에 다시 들어왔는데,\n가구 손상은 제로.\n그 더운 날 컨테이너에서 잘 견디고 왔습니다.\n\n가구 위치도 꼼꼼히 봐주시고,\n잔짐들도 잘 정리해 넣어주셨어요.\n\n무엇보다 GS 사장님네는 말없이 손이 빠르세요. ㅎ\n\n이용해본 결과 GS 장점을 정리하면:\n타 업체 비해 견적 저렴하고,\n협력 업체 서비스 편리하고 우수하며,\n고객 대응 시원시원합니다.\n신경 쓸 거 없어요.\n\n보관 이사 너무 걱정 마시라고 후기 써봐요. ^^",
  43: "살던 집 리모델링 공사로 보관 이사를 결정하고\n입주 후 이사까지 무사히 마쳤습니다.\n\n아이 아빠가 장기 출장으로\n남편 없이 처음 해보는 이사라\n걱정이 많았습니다만, 그 걱정은 기우였습니다. ^^\n\n섬세한 손길로 빠르고 신속하게 정리해 주신 덕분에\n무사히 이사를 마쳤어요.\n\n리모델링 후 베이크아웃을 하느라\n아직 보일러 열기가 남아서 많이 더우셨을 텐데,\n죄송하고 감사합니다.\n\n다음에 이사할 때도 연락드릴게요. ^^\n고생 많으셨습니다.",
  42: "이사한 지 일주일,\n이제 좀 집의 형태를 갖추고 있어요.\n\n강봉원 참고하여 GS이사몰 이용했어요.\n대만족입니다.\n\n담당 실장님이 젊고 일 잘하세요.\n싹싹하다고 해야 하나, 친절해요.\n\n저는 언제부턴가 무뚝뚝한 분들 상대하기가 힘들더라고요.ㅠㅠ\n근데 이사 실장님 친절하셔서\n편하게 이사할 수 있었어요.\n\n오신 분들 다 일을 잘하세요.\n베테랑이란 게 이런 거구나 하고 느꼈어요. ㅎㅎ\n\n특히 정리 이모님,\n자기 살림처럼 해주세요.\n냉장고에 손자국 남았다고 끝까지 닦아주시고.\n\n가을에 친정이 이사하는데 그때 또 맡기려고요.\n\n까칠한 저희 집 남자도 마음에 들었는지\n\"2년 있다 뵙겠습니다\" 하더라고요. ㅎㅎ\n\n내 돈 내산으로 이사했어요.\n후기 댓가 아무것도 없고,\n진짜 이사를 잘해주셔서 후기 남겨요.",
  36: "8월 4일 수유3동에서 쌍문1동으로 이사.\n\n견적 보러 오셨을 때\n아이 책이 좀 많다고 해서 5명이 오시기로 했어요.\n여기는 1팀뿐이며 젊은 사람들만 있다고 하였어요.\n견적은 다른 곳보다 조금 비싼 듯 하지만\n잘 해주실 거라 믿었어요.\n\n8시쯤 오신다 하셨는데\n7시 30분 좀 안 돼서 이모님이 오셨어요.\n그 시간 밥 다 먹고 옷 입고 준비하고 있기도 해서\n일찍 오신 거 좋았어요.\n\n이사 갈 집은 1층 천장이 낮아서\n사다리가 못 들어와서\n엘베로 짐을 옮겨야 하는 상황이었어요.\n무지 힘드셨을 텐데ㅠㅠ\n\n너무 친절하고 깔끔하게 정리 잘 해주셨어요.\n\n아버지가 \"일하시는 분들 너무 일 잘한다\"고 칭찬을,\n엄마도 \"일 잘한다\"고 마음에 들어하셨어요.\n\n덕분에 이사 잘 했어요.\n강봉원 덕에 이사 잘 했네요.",
  35: "어디 이사 업체로 할까 고민하다가\n전에 하던 곳에서 또 이사 업체를 선택했어요.\n\n실장님도 친절했었고,\n직원분들도 친절했고,\n이사도 만족스러웠었거든요.\n\n견적 보러 와주셨을 때 알아봐주시니 반가웠어요. ~ㅋㅋ\n전에 분들은 나이가 있으셔서\n직원들을 젊은 분들로 바꾸셨다고 하셨는데, 좋았던 것 같아요.\n\n흠집 안 나게 포장도 꼼꼼히 해주시고,\n이모님은 냉장고 청소며 세탁실이며 화장실 등\n꼼꼼하게 청소해주시더라고요.\n\n주방도 저한테 맞춰가며 정리해주시고.\n이모님 넘 친절하심. ♡\n\n더우신데 짜증 한 번 내지 않으시고\n손발 빠르시게 다 옮기고 배치도 해주셨네요. ^^\n\n이사 도중 아이 가구를 직원분이 좀 파손하셨는데,ㅠㅠ\n바로 보상해주었네요.\n\n이사를 또 하게 된다면 이곳에서 또 할 것 같아요. ㅋㅋㅋ\n다시 한번 고생 많으셨고 감사합니다.\n이사하실 분들, 여기 업체 추천합니다.",
  34: "저는 인테리어 때문에 보관 이사 3개월 진행했구요.\n처음 견적은 3군데 받았어요.\n견적은 비싸지도 않지만 저렴하지도 않았고요. ㅎㅎ\n\n사장님이 차분하게 하나하나 설명해주셔서\n믿음이 가 바로 계약했어요. ~~^^\n\n중간에 직원분의 작은 해프닝도 있었지만\n사장님께서 현장에 있었기 때문에\n책임감 있게 해결해주셨어요!!\n\n3개월치 짐이 친정댁으로 1톤 차 한 대가 이동했는데,\n그것도 다 처리해주시고\n이삿날에도 다시 와서 옮겨주시고.ㅠㅠ 너무 감동이었어요.\n\n보관 이사 정말 먼지 쌓이고 가구 다 버린다는 얘기 듣고\n걱정이 한가득이었는데,\n보관 전문 업체에 맡기는 거라 진공 상태로 보관한다 하더라고요.\n정말 먼지 없이 멀쩡해서 놀랐어요!!!\n\n블라인드며 커튼이며 다 달아주시고\n마무리도 깔끔하게 해주셨네요!!\n정말 만족해요. ~~~!",
  31: "8월 초에 이사하고 한 달여 지났지만\n후기 꼭 남기고 싶어서 몇 자 적어봅니다.\n\n3군데 정도 견적 받아봤고요.\n가격은 모두 달랐는데 크게는 50만 원 가까이 차이가 났어요.\n세 군데 견적 중 GS이사몰이 중간 가격대였습니다.\n\n카페 후기 글 및 댓글까지 꼼꼼하게 다 찾아봤어요.\n현장 견적 받을 때 팀장님이 직접 와서 체크해주시고,\n이사 당일도 팀장님이 직접 오셔서 작업해주신다는 부분이\n제일 신뢰감이 들어서 결정했습니다.\n\n저희 집 책이 어마어마했습니다.\n이사 끝나고 팀장님이\n\"기록을 갱신했다\"는 말씀도 해주실 정도로요.\n\n계속 나오는 책 정리, 무겁고 힘드셨을 텐데,\n끝까지 친절하게 작업해주셨습니다.\n시간도 오래 걸렸고 짐도 많았지만,\n처음 계약 당시 말씀하셨던 것처럼\n추가 금액 없었습니다.\n\n가구 배치나 짐도 하나하나 다 물어서 결정해주시고,\n그 더운 날 힘드셨을 텐데\n정성스럽게 작업해주셔서 감동이었습니다.\n\n무엇보다 친절하신 팀장님이\n상담부터 마무리까지 함께해주시는 점이 가장 좋았습니다.",
  30: "전남으로 이사를 해서\n정말 신중하고 신중하게 업체를 선정했습니다.\n\n카페를 보다 우연히 봤는데,\n왠지 믿음이 갔어요.\n\n역시나 깔끔하게 이사 잘해 주셨어요.\n멀리 오셨는데도 정말 최선을 다해 주셔서\n너무 감사했습니다.\n\n추천해드리고 싶은 업체입니다.\n너무 감사합니다.",
  28: "6월 3주 정도 보관 이사 후 7월에 이사했어요.\n\n큰 가구가 많고 잔짐이 많았는데,\n다들 친절하고 힘든 내색 없이 옮겨주셨네요.\n\n처음 견적 보러 왔을 때\n젊은 훈남 오빠 두 명이 와서\n\"짐은 제대로 옮겨주시려나\" 했는데. ㅋㅋ\n\n스위치 커버, 콘센트 커버까지 몇 개 달아주시고,\n너무 친절하시네요.\n\n주방 이모도 손도 빠르고 항상 웃고 계시고.\n남자분 2분도 가구 때문에 애매했던\n침대 배치도 알려주시고 좋았어요.\n\n이삿짐 내리는 건 10시 시작해서\n1시 반~2시쯤 끝난 것 같아요.\n생각보다 일찍 끝났어요.\n\n비용은 다른 데 견적 안 보고\n강봉원 협력이라 그냥 믿고 맡겼어요.\n언제 또 이사할지 모르겠지만,\n다음에도 또 이용할게요.",
  25: "5/4 이사했어요!!\n\n포장 이사가 처음이여서\n모르는 게 너무 많아 인터넷으로 엄청 검색 했어요.\n당연히 견적도 엄청 많이 받았습니다.\n\n그중에 GS이사몰을 선택한 이유가:\n시간 약속 잘 지켜 주셨고,\n견적 보러 오셨을 때 꼼꼼히 봐주셨고,\n아기 물품을 신경 써주셨어요.\n여긴 카페 전담팀이고\n남자 3분, 여자 1분 배정해주셨네요.\n\n이사 전날 확인 전화 꼼꼼히 해주셔서\n물품 한 번 더 확인할 수 있어서 좋았고,\n당일 8시에 정확하게 오셔서 이사 진행하는데\n직원분들이 젊으셔서 스피드가 장난 아니에요!!\n\n이사하면서 옷장 버리고 행거를 샀는데,\n신랑이 했으면 꽤 오래 걸렸을 행거도\n샤샥 설치해 주셨고,\n구조적인 부분 고민할 때도 조언해주셔서\n잘 결정할 수 있었어요.\n\n냉장고나 세탁기 이사할 때 많이 망가진다고 들었는데,\n냉장고 문 제일 중요한 부분 꼼꼼히 확인해 주시고\n뒷정리까지!!!\n\n나중에 알게 된 사실이지만\n세탁기 연결이 반대로 되어 있었다는 것,\n이거 말곤 퍼펙트예요!!!\n\n다음에 이사하게 되면 GS 확정입니다!!",
  24: "살던 집 리모델링 하면서 3주 정도 보관 이사를 하게 됐어요.\n\n반년 전쯤 친정집 이사하는데\n목걸이, 반지 등 도난품이 발생해서\n경찰서 가서 직접 진술하고\n아직도 해결 안 된 나름 큰 사건이 있어서,\n이사 업체 선정이 굉장히 중요하고 예민했는데.\n\n강봉원 협력 업체인 만큼 믿을 수 있다는 생각에\n견적 받은 날 바로 계약했어요.\n\n6일 오전 8시부터 시작하여\n11시 반쯤 마무리된 것 같아요.\n주방 이모 한 분, 남자분 세 분 오셔서\n일사천리로 진행해주셨고,\n특히 보관 이사라 냉장고를 미리 싹 비워놨더니\n새로 산 것처럼 깨끗하게 닦아주셨네요!\n\n인테리어 공사하는 동안 면목동 친정에 머물게 되어\n침대, 책장, 매트 등의 큰 짐을 옮겨야 해서\n미리 부탁드렸더니,\n보관 이사 하는 짐과 따로 이동할 수 있도록\n용달차를 추가로 가지고 오셔서\n옮겨주시고 조립까지.ㅠ 감동 감동.ㅠ\n\n보관하는 짐들 컨테이너에 넣고\n사진도 찍어 보내주시고,\n여러모로 감사하고 감동이었던 GS이사몰!",
  22: "3월 말에 원룸에서 이사했었는데\n그동안 이래저래 바빠서 이제서야 후기를 씁니다.\n\n견적 봐주신 젊은 분도 친절하시고,\n이사 당일 짐 옮겨주신 2분도 친절하셔서 좋았어요.\n\n예전에 원룸으로 이사 갈 때\n어떤 용달 업체를 썼었는데,\n불친절하고 물건 파손도 심했어서\n이번엔 검증된 곳으로 하려고 알아봤거든요.\n\n카페 협력 업체이기도 하고\n후기도 괜찮은 것 같아서 이번에 이용해봤는데,\n매우 만족했어요.\n친절하시고 물건도 손상 없구요.",
  21: "결혼 후 3년 만에 첫 번째 이사를 하게 됐어요.\n결론 먼저 말씀드리면\n만족스러운 이사였습니다.\n\n포장 이사 업체 수많은 후기들을 보면서\n어디에 이사를 맡겨야 하는지 고민이 많이 됐습니다.\n\n여러 후기를 보며 내린 결론은\n결국 팀을 잘 만나야 하는 거더라고요.\n\n견적 받으며 어떤 팀이 오는지,\n외국인이 포함되어 있는지 문의드렸고,\n모두 한국인에 실장님이 직접 와주신다는 말에\n바로 계약했어요.\n\n이사 당일 8시에 정확히 오셔서 시작하셨어요.\n주방은 이모님이 담당하시고,\n나머지는 젊은 남자분들이 담당해서\n빠르게 진행하셨어요.\n\n분해장이 있어서 걱정했던 부분이 있었는데,\n흠 없이 분해 안 한 것처럼\n다시 잘 만들어 주셨어요.\n\n냉장고 넣는 곳이 장판 때문에 설치가 어려웠는데,\n장판 떼어내고 말끔히 청소해 주신 뒤\n설치해 주셨구요.\n\n아일랜드 식탁 위치가 애매했는데\n이모님이 잘 조언해 주셔서 자리도 잘 잡았어요.\n\n잔짐들도 원래 있던 자리에 잘 정리해주셨고,\n자잘한 화분들도 잘 옮겨주셨어요.\n\n덕분에 이사 잘 했습니다.\n5월에 시부모님도 이사하시는데\n견적 받아보시라고 말씀드렸어요.",
  19: "오늘 오전 8시부터 빠르게 이사를 진행했어요.\n\n이사하는 도중 같은 단지 출근 차량들 때문에\n이사 차량들 왔다 갔다 할까봐 조마조마했는데,\n다행히도 큰 어려움은 없었네요.\n\n직원분들도 힘든 표정 없이\n필요한 거 없는지 계속 여쭤봐주시고\n잘해주신다고 생각이 들 정도였어요.\n\n그렇게 입주한 집에서도 뚝딱뚝딱 다 하고,\n장롱까지 딱 맞춰주시고.\n\n큰 행사를 GS이사몰에서 하게 되어\n정말 다행이라 생각합니다.\n다음에 또 이사하게 된다면 또 이용할게요.\n번창하세요.",
  15: "이사한 지 이주 정도 되었네요. ㅎㅎ\n이제서야 정리 다 끝내고 후기 올립니다. ㅋㅋㅋ\n완전 솔직히 올릴게요. ~~~ㅋㅋㅋ\n\n이사라는 걸 처음 해서\n뭘 어떻게 해야 할지 몰라서\n이사 당일날도 어리버리하고 있었는데,\n사장님께서 \"걱정 마시고,\n전화하면 오셔서 확인만 해주시면 된다\"고 하셔서\n마음 편히 잘 있었습니다. ㅋㅋㅋ\n\n전화 와서 다시 가보니\n엄청 깨끗이 마무리 정리까지 해주셨더라고요. ㅋㅋ\n아주 좋았습니다!!\n\n이사할 집에 저희보다 먼저 도착하셨는데도\n먼저 들어가시지 않고\n저희가 올 때까지 기다려주신 것도 너무 감사했습니다!!\n\n짐들 이사할 때도 기스 나지 않게 신경써주시고,\n물건도 알아서 꼼꼼히 정리해주셔서 아주 감사했습니다.\n\n잠시 자리를 비운 사이에 신랑이랑 가구 위치를 정해서 옮겼는데,\n제 마음에 안 들어 다시 옮겨달라고 부탁드렸는데\n기분 언짢은 티도 없이 바로 옮겨주셔서 아주 감사했습니다!!\n\n주방에 안방 엄청 깨끗이 잘 정리해주셨더라고요.\n\n진짜 다 좋으신데,\n저희가 옷장을 버리고 두고 온 게 있어서\n정리는 어려우실 수 있다고 생각은 했는데\n역시나 짐들을 어디에 두어야 할지 모르겠다고 하셨어요.\n그래서 그냥 두시면 제가 정리하겠다고 했습니다.\n\n나머지는 다 만족해서\n굳이 점수를 준다면 90점 정도? ^^\n결론적으로는 정말 좋았습니다.\n다음에 이사할 때도 또 여기서 할 거예요!!!!!",
  14: "글 남긴다고 뭐 받는 거 없지만\n마음에 우러나 후기 남겨요.\n\n이사 당일 예약이 완전 풀로 차버린\n사다리차 때문에 사다리차 없이 진행하느라\n너무 오래 걸렸는데,\n직원분들이 나름 손발 척척 신나게 작업해주신 덕에\n이삿짐 싸는 거 거의 다섯 시간을\n구경하며 즐겁게 보냈어요. ㅋㅋ\n\n세탁기가 문으로도 안 되고\n결국 창문 샷시 뜯어서 빼느라 고생고생한 팀장님.\n\n아기 있는 집 보관 이사라 너무 예민했었는데\n직접 보관 컨테이너까지 따라가서 확인했어요.\n남편이 직접 컨테이너 안도 확인하고\n\"어디서 이렇게 깨끗한 업체 골랐냐\"면서 놀라더라고요.\n보관 다 됐다고 컨테이너 사진 찍어\n확인 문자까지 보내주셨어요.\n\n이사 들어오는 당일은 사다리차에\n다섯 분이나 오셔서 훅 끝내고 가셔서\n두 시간? 두 시간 반도 안 걸린 것 같아요.\n짐도 최대한 원래 있던 대로 해주시고. ㅎㅎㅎ\n\n아!!!!!\n작업하시다가 모르고 벽지를 조금 찍으셔서\n그게 좀 아쉽긴 해요.\n\n올수리하고 들어온 거라 속상하지만,\n다른 부분에서 너무 만족해서\n그냥 그 부분 안 보고 살려고요. ㅋㅋ",
  13: "10월 말 노원구에서 경기도로 이사했어요.\n\n다른 곳 견적 안 받고 후기가 좋아서 전화로 예약했어요.\n너무 바쁘셔서 전화로 예약 잡고\n견적 보러 오시지도 못했네요.\n\n남편이 군인이라 여기저기 이사 다니면서\n브랜드 이사 업체, 비싼 곳, 싼 곳\n이것저것 해봤는데 여기가 제일 좋았네요.\n\n앞으로도 여기서 쭉 이용할 예정이에요.\n강추드립니다. ^^",
  12: "일주일 전에 이사한 후기입니다.\n이사하고 김장이랑 겹쳐서 정신없이 지내다\n이제야 후기를 올리네요.\n\n이사 전에 제가 시간이 없기도 했고,\n견적 받을 때 \"견적 해주신 분이 직접 오셔서\n같이 이사 해주신다\"는 말씀에 믿음이 가서\n다른 곳 견적 안 받고 결정했어요.\n\n이삿날 진짜로 견적 보러 오셨던\n두 분 모두 오셔서 같이 작업을 하셔서\n더욱 믿음이 갔습니다.\n\n이사 중간중간 견적 때 제가 얘기했던 부분\n잘 기억해주셔서 작업해 주셔서 더 좋았습니다.\n\n이사 총 3번을 했었는데,\n정말 제일 만족한 것 같아요.\n\n작업 시간도 확실히 빠르시고,\n작업하시는 분들끼리 손발이 척척 잘 맞으시더라고요.\n\n저희 집이 자질구레 잡다한 것들이 좀 많았는데\n너무 잘 챙겨주셨어요.~~~!!\n\n신랑이 처음부터 계속 같이 있었는데,\n진짜 까칠한 신랑인데\n완전 \"일 잘해주신다\"고 너무 좋아했답니다.\n\n언제 이사하게 될지 모르겠지만,\n다음에 또 이사하게 돼도 여기서 하고 싶을 정도로\n만족한 이사였습니다.",
  11: "자꾸 미루다가는 후기를 못 쓸 것 같아서,\n다른 회원님 후기 보고\n저도 생각난 김에 몇 자 적어볼게요. ~~^^\n\n그동안 후기 보고\n다른 업체 잘 알아보지도 않고\nGS 통해서 이사해야겠다,\n맘속으로 이미 결정했었죠. ㅋ\n\n견적 봐주셨던 젊은 대표님 이래저래 설명 듣고,\n역시 선택 잘 했다 싶었어요. ~~^^\n\n이삿날 당일!!\n거주했던 아파트 관리실 착오로\n사다리차 자리 확보가 안 되어 있는 상태였는데.;;;\n시간보다 일찍 도착해주셔서\n알아서 처리해주셨어요. ~~^^\n\n저희 집이 장난감도 문제지만,\n저의 취미 활동으로 인한 물건들이 너무 많아요.ㅠㅠ\n다~~~ 잘 챙겨주시고. ~~^^\n\n그런데 문제는!!!!!\n아침부터 보슬보슬 내리던 비가\n짐을 다 내리는 시점부터 마구 쏟아지네요.ㅠㅠ\n\n비옷도 안 입으시고, 못 입으시고,\n일하시는 분들 비 다~~~ 맞으며\n고생하시는 모습,\n맘이 안 좋았어요.ㅠㅠ\n\n그렇게 비 맞으며\n비 오는 날 무사히 일을 잘 마치셨고. ~^^\n가구 상한 데도 없었고,\n없어진 물건도 없었구요. ~~^^\n\n다음에 이사한다면,\n주저 없이 GS이사몰 계약합니다. ~~^^\n\n다시 한번, 비 오는 날 너무 고생 많으셨습니다.\n감사합니다. ~^^",
  9: "이사한 지 벌써 이주일 가량 지났네요.\n이사 후 바로 여름휴가를 다녀오는 바람에\n아직도 정리가 안 된 것 같아요. ^^;\n\n2주 정도 보관 이사를 해야 해서\n조금 더 꼼꼼히 해주실 업체를 찾았고,\n대체로 후기가 좋은 GS이사몰에서 했어요.\n\n보관 이사다 보니 강봉원 협력 업체인 것이\n더 크게 작용했고, 아주 만족해요.\n\n여름이라 습기나 테이프 끈적임 같은 걸 많이 걱정했는데\n천이나 비닐로 꼼꼼히 포장해 주셔서\n상한 물건 전혀 없이 잘 했어요.\n\n가장 좋았던 것은\n이 무더위에 이사 진행 하시면서\n늘 웃는 얼굴로 친절히 대해주셨던 점이에요.\n\n저희 남편이 타 업체 이사하는 곳을 보고 오더니\n\"이사 업체를 아주 잘 골랐다\"고 하더군요.\n\n이사 끝난 후에도 전화로 이것저것 신경써 주셔서\n더 감사했구요.\n\n이모님 냉장고 깨끗하게 닦아주시고\n그릇 정리도 너무 잘 해주셔서,\n지금도 그대로 쓰는데 불편함이 없어요.\n\n매니저님이 얼마나 세심하시냐면,\n책장 정리된 거 보시더니 아이 책이 조금 위쪽에 있어서\n위아래 책 다 빼고\n아이 눈높이에 맞게 책 정리해 주고 가셨다고 해요.\n남편이 말해줬어요. ^^\n\n가격도, 정리도, 친절함도 진짜 만족했어요.\n포장 이사 처음인데 감동 서비스 고마웠습니다. ^^",
  8: "이사한 지 이제 한 달 좀 넘었네요.\n\n이사 업체 여기저기 찾아보다가\n강봉원에서 이사하신 분들 후기도 좋고 해서\n연락 드렸는데,\n너무 친절하게 방문 견적 내주셔서\n다른 곳 추가 견적 안 받고 바로 계약했어요.\n\n깔끔한 포장재도 좋았지만,\n일하시는 분들께서 알아서 척척 꼼꼼하게 포장해주셨어요.\n\n보관 이사라 더 꼼꼼하게 요청 드렸는데\n너무 마음에 들게 잘해주셨어요.\n보관 이사 중에도 공사 일정 때문에 일정 조절 요청드렸는데\n매니저님 너무 친절하게 대해주셔서 감사했어요.\n\n포장 이사 후에도 처음에 오신 분들이 오셔서\n가구 배치며 주방도 깔끔하게 해주셨어요.\n\n이모님 역할 중요한 거 아시죠?\n저는 이사날 아이랑 있느라 못 갔는데,\n이모님 냉장고 깨끗하게 닦아주시고\n그릇 정리도 너무 잘 해주셔서\n아직도 그대로 쓰는데 불편함 없어요.\n\n매니저님 얼마나 세심하시냐면,\n정리 마무리 하시면서 책장 정리된 거 보시더니\n아이 책이 조금 위쪽에 있어서\n위아래 책 다 빼고\n아이 눈높이에 맞게 책 정리해 주고 가셨다고 해요.\n남편이 전해줬어요. ^^\n\n막 나가시자마자 안 된 부분이 발견되어\n바로 전화드렸더니,\n귀찮아하는 기색 없이 바로 달려오셔서\n해결해주셨답니다.\n\n가격도 정리도 친절함도 진짜 만족했어요.\n포장 이사 처음인데 감동 서비스 고마웠습니다. ^^",
  6: "GS이사몰에서 7월쯤 견적 받고 바로 계약했어요.\n견적 내러 오신 분이 말씀도 너무 잘하시고,\n꼼꼼하게 해주실 걸 자신하셔서 믿고 계약했습니다.\n\n10월 12일 8시 30분쯤부터 시작해서\n3시 30분쯤 끝났어요.\n\n저희가 30평대인데 수납 공간이 많아\n잔짐들이 많았음에도\n속도도 빠르시고 꼼꼼하게 포장해주셨답니다.\n\n예전에 이사하면서 냉장고 바퀴 쪽이 조금 부서지고\n가구가 뒤틀렸었다고 미리 말씀드렸더니,\n냉장고 수평도 잘 맞춰주시고,\n가구는 전보다 더 사용하기 편하게 만들어주셨어요.\n\n날짜 때문에 입주 청소를 못하고 들어가서\n청소에 조금 더 신경써주십사 따로 부탁드렸는데,\n이모님도 두 분 오셔서\n부엌과 바닥 청소도 두 번씩 해주셨어요. (정말 감사해요!! ^^)\n\n나사 헐거운 부분도 다 조여주시고,\n커튼과 블라인드도 깔끔하게 달아주셨어요.\n\n막 나가시자마자 안 된 부분이 발견되어\n바로 전화드렸더니,\n귀찮아하는 기색 없이 바로 달려오셔서\n해결해주셨답니다.\n\n그날 청소 상태 덕분에\n아이 데리고 식사도 하고 잠도 잘 수 있었어요.\n\n서비스 대비해서 저는 완전 만족했어요. ^^\nGS이사몰 추천합니다!",
  4: "급작스럽게 이사를 가게 돼서\n강원맘 카페에 이삿짐 추천 문의 글을 올렸더랬죠.\n\n쪽지가 거짓말 안 보태고 87개가 왔습니다.\n\n어찌나 그렇게 후기들이 많으신지,\n그중에 진짜 어느 분이 제대로 된 후기인지\n분간이 안 갈 정도였어요.\n\n그리하여 3군데로 견적을 보기로 했죠.\n\n결론부터 말씀드리면\n완전 대만족 그 이상이십니다.\n\n단독 주택 2층에서 복층 집으로 이사를 해야 해서\n짐 옮기기도 너무 힘들었는데,\n너무 꼼꼼하게 가구며 그릇이며 옮겨주셨고요.\n\n특히 주방 이모님 최고!\n저희 집 냉장고가 그리 넓은 줄 몰랐네요. ㅎㅎ\n음식물 꺼내시면서 먹을 수 있는 것, 없는 것 나눠서 분리해주시고,\n냉장고 다 칸막이 분리해서 설거지까지 해주신답니다.\n\n다른 직원분은 제가 잃어버린 목걸이도\n2개나 찾아주셨어요. ㅋㅋ\n\n그리고 이사하다가 갑자기 장대비가 쏟아졌어요.\n와, 진짜 멘붕.\n\n직원분들 다 같이 그 장대비 내리는데\n후다다다닥 내려가셔서\n짐 비 맞을까봐 다 커버 쳐주시고,\n비 쫄딱 맞으시면서도 천막 들고 계시더라고요.ㅠ\n\n이사짐 다 풀고 정리해주시고,\n바닥 청소, 스팀 청소까지 마무리 싹 해주셨습니다.\n\n이사 준비하면서 혼자 알아보고 결정하기까지\n너무너무 스트레스를 많이 받았기에,\n이렇게 후기를 남깁니다.",

// ============ 매핑 ============
// 작은 키워드 (좌상단 — 이사 타입)
const typeLabel = {
  '일반포장': '일반 포장이사',
  '보관이사': '보관이사',
  '신혼': '신혼 첫이사',
  '부모님': '부모님 이사',
  '원룸': '원룸 이사',
  '장거리': '장거리 이사',
  '재이용': '재이용 고객'
};

// 메인태그 순서 (그룹핑용)
const mainTagOrder = ['실력의차이', '가격', '친절응대', '정리정돈', '고난도돌파', '책임감', '유형별이사', '속전속결', '재이사맛집'];

function getKeyword(r) {
  // 업그레이드된 후기 타이틀 사용
  return r.newTitle || '';
}

// ============ 벤토 패턴 ============
// 18장 — 경계선 어긋남 유지, 색 분포 밸런스
// light(기본) 지배적 / orange·black 액센트 / dark 리듬
const bentoPattern = [
  { h: 'l', v: 'orange' },
  { h: 'm', v: 'light' },
  { h: 's', v: 'black' },
  { h: 'm', v: 'light' },
  { h: 'l', v: 'light' },
  { h: 's', v: 'dark' },
  { h: 'm', v: 'light' },
  { h: 'l', v: 'dark' },
  { h: 's', v: 'orange' },
  { h: 'm', v: 'light' },
  { h: 'm', v: 'light' },
  { h: 's', v: 'dark' },
  { h: 's', v: 'light' },
  { h: 'm', v: 'orange' },
  { h: 'l', v: 'light' },
  { h: 's', v: 'light' },
  { h: 'm', v: 'dark' },
  { h: 'l', v: 'light' }
];

let activeType = '하이라이트';

function render() {
  const grid = document.getElementById('bento');
  // tags 기반 필터링: 하이라이트 = tags에 '하이라이트' 포함된 것만
  let filtered = activeType === '하이라이트'
    ? reviews.filter(r => r.tags && r.tags.includes('하이라이트'))
    : reviews.filter(r => r.tags && r.tags.includes(activeType));

  // 정렬 규칙:
  // 1) best 파일 후기가 항상 상단, sub 파일 후기는 하단
  // 2) best/sub 그룹 내에서는 메인태그 순서대로 묶이도록 정렬
  // 3) 같은 메인태그 내에서는 최신 id 우선
  const sourceRank = { 'best': 0, 'sub': 1 };
  filtered.sort((a, b) => {
    const s = (sourceRank[a.source] ?? 2) - (sourceRank[b.source] ?? 2);
    if (s !== 0) return s;
    const ai = mainTagOrder.indexOf(a.mainTag);
    const bi = mainTagOrder.indexOf(b.mainTag);
    const ma = ai === -1 ? 999 : ai;
    const mb = bi === -1 ? 999 : bi;
    if (ma !== mb) return ma - mb;
    return b.id - a.id;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;padding:60px;text-align:center;font-size:13px;opacity:0.5;letter-spacing:0.05em">결과 없음</div>';
    return;
  }

  // HTML 특수문자 이스케이프 — 타이틀 내 큰따옴표·꺾쇠·앰퍼샌드가
  // 속성/콘텐츠를 깨뜨리지 않도록 처리 (타이틀에 " 들어있는 후기 다수)
  const esc = s => String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

  grid.innerHTML = filtered.map((r, i) => {
    const pattern = bentoPattern[i % bentoPattern.length];
    const keyword = esc(getKeyword(r));
    const subKeyword = esc(typeLabel[r.type] || r.type);
    const ariaLabel = esc((r.newTitle || '').replace(/\n/g,' ') + ' — 후기 자세히 보기');

    // parallax 제거됨 — card-index만 애니메이션 stagger용으로 사용
    const styleVars = `--card-index:${i};`;

    return `
      <article class="cell h-${pattern.h} v-${pattern.v}" data-id="${r.id}" style="${styleVars}" role="button" tabindex="0" aria-label="${ariaLabel}">
        <div class="cell-top">
          <span class="cell-sub">${subKeyword}</span>
          <svg class="cell-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <line x1="7" y1="17" x2="17" y2="7"/>
            <polyline points="8 7 17 7 17 16"/>
          </svg>
        </div>
        <div class="cell-keyword">${keyword}</div>
      </article>
    `;
  }).join('');

  // (parallax 제거 — .settled 추가 불필요)
}

document.getElementById('type-chips').addEventListener('click', e => {
  if (!e.target.matches('.chip')) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  activeType = e.target.dataset.type;
  render();
});

render();

// Parallax 스크롤 효과 제거됨 — 카드가 고정 위치여야 클릭 정확도가 높음

// ============ Bottom Sheet 로직 ============
(function setupBottomSheet() {
  const sheet = document.getElementById('sheet');
  const overlay = document.getElementById('sheet-overlay');
  const handle = document.getElementById('sheet-handle');
  const closeBtn = document.getElementById('sheet-close');
  const grid = document.getElementById('bento');

  const subEl = document.getElementById('sheet-sub');
  const titleEl = document.getElementById('sheet-title');
  const metaEl = document.getElementById('sheet-meta');
  const highlightEl = document.getElementById('sheet-highlight');
  const fulltextEl = document.getElementById('sheet-fulltext');

  function openSheet(reviewId) {
    const review = reviews.find(r => r.id === reviewId);
    if (!review) return;

    // 콘텐츠 채우기
    subEl.textContent = typeLabel[review.type] || review.type;
    titleEl.textContent = (review.newTitle || '').replace(/\n/g, ' ');
    metaEl.innerHTML = `
      <span>${review.nickname}</span>
      <span class="dot"></span>
      <span>${review.date}</span>
      <span class="dot"></span>
      <span>#${String(review.id).padStart(3, '0')}</span>
    `;
    // 대괄호("") 안 하이라이트 문장은 제거 — 빈 값으로 초기화 + DOM 숨김
    highlightEl.textContent = '';
    highlightEl.style.display = 'none';

    // 전체 리뷰 원본
    const fullText = fullTextMap[review.id];
    if (fullText) {
      // 문단 단위로 분리해서 <p>로 감싸기 (두 줄 이상 빈 줄 = 문단 구분)
      const paragraphs = fullText.split(/\n\n+/).filter(p => p.trim());
      fulltextEl.innerHTML = paragraphs.map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
    } else {
      fulltextEl.innerHTML = '<p>전체 리뷰를 불러오는 중입니다.</p>';
    }

    // 스크롤 위치 맨 위로
    document.getElementById('sheet-body').scrollTop = 0;

    // 시트 열기
    document.body.classList.add('sheet-open');
    overlay.classList.add('open');
    sheet.classList.add('open');
    sheet.setAttribute('aria-hidden', 'false');
  }

  function closeSheet() {
    document.body.classList.remove('sheet-open');
    overlay.classList.remove('open');
    sheet.classList.remove('open');
    sheet.setAttribute('aria-hidden', 'true');
    // 드래그 transform 리셋
    sheet.style.transform = '';
    sheet.classList.remove('dragging');
  }

  // 카드 클릭 → 시트 열기 (이벤트 위임)
  // e.target 이 카드 내부 어느 요소든 closest로 .cell을 찾아 올라감
  grid.addEventListener('click', e => {
    const cell = e.target.closest('.cell');
    if (!cell) return;
    const id = parseInt(cell.dataset.id, 10);
    if (id) openSheet(id);
  });
  // 키보드 접근성: Enter / Space로 카드 열기
  grid.addEventListener('keydown', e => {
    const cell = e.target.closest('.cell');
    if (!cell) return;
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      const id = parseInt(cell.dataset.id, 10);
      if (id) openSheet(id);
    }
  });

  // 닫기 트리거들
  overlay.addEventListener('click', closeSheet);
  closeBtn.addEventListener('click', closeSheet);

  // ESC로 닫기
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && sheet.classList.contains('open')) {
      closeSheet();
    }
  });

  // 핸들 드래그로 닫기 (터치 + 마우스)
  let dragStartY = 0;
  let dragCurrentY = 0;
  let isDragging = false;

  function onDragStart(clientY) {
    isDragging = true;
    dragStartY = clientY;
    sheet.classList.add('dragging');
  }

  function onDragMove(clientY) {
    if (!isDragging) return;
    dragCurrentY = clientY - dragStartY;
    if (dragCurrentY < 0) dragCurrentY = 0; // 위로는 못 당김
    sheet.style.transform = `translateY(${dragCurrentY}px)`;
  }

  function onDragEnd() {
    if (!isDragging) return;
    isDragging = false;
    sheet.classList.remove('dragging');
    // 100px 이상 당겼으면 닫기, 아니면 복귀
    if (dragCurrentY > 100) {
      closeSheet();
    } else {
      sheet.style.transform = '';
    }
    dragCurrentY = 0;
  }

  // Touch events (모바일)
  handle.addEventListener('touchstart', e => {
    onDragStart(e.touches[0].clientY);
  }, { passive: true });
  handle.addEventListener('touchmove', e => {
    onDragMove(e.touches[0].clientY);
  }, { passive: true });
  handle.addEventListener('touchend', onDragEnd);

  // Mouse events (데스크탑 — 데스크탑에선 핸들 숨겨져 있지만 대비)
  handle.addEventListener('mousedown', e => {
    e.preventDefault();
    onDragStart(e.clientY);
    const moveHandler = ev => onDragMove(ev.clientY);
    const upHandler = () => {
      onDragEnd();
      document.removeEventListener('mousemove', moveHandler);
      document.removeEventListener('mouseup', upHandler);
    };
    document.addEventListener('mousemove', moveHandler);
    document.addEventListener('mouseup', upHandler);
  });
})();
