// ============ 필터별 랜덤 패턴 생성 ============
// 설계 원칙:
//   1) bentoPool 의 색/높이 분포 그대로 (미학적 밸런스 유지)
//   2) 필터마다 고유 시드 → 같은 필터는 항상 동일 배치
//   3) 인접(연속)한 카드의 같은 강조색 중복 최소화
//   4) "+자 교차로" 방지 — 좌우 이웃 카드의 높이가 같지 않도록 배치

// 문자열 시드 → 정수 해시 (xmur3)
function hashSeed(str) {
  let h = 1779033703 ^ str.length;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = h << 13 | h >>> 19;
  }
  return () => {
    h = Math.imul(h ^ (h >>> 16), 2246822507);
    h = Math.imul(h ^ (h >>> 13), 3266489909);
    return (h ^= h >>> 16) >>> 0;
  };
}

// 시드 기반 난수 생성기 (mulberry32)
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// Fisher-Yates shuffle (시드 난수 기반)
function seededShuffle(arr, rng) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ========================================================================
// grid-auto-flow:dense 기반 2열 배치에서 "좌우 이웃" 예측은 불완전하지만,
// 근사적으로 홀수-짝수 인덱스가 좌우 열에 들어간다고 가정.
// (dense flow는 빈 공간을 채우느라 순서가 바뀔 수 있으나, 높이가 같을 때는
//  같은 row에 나란히 들어가는 경향이 강하므로 이 가정으로도 대부분의 교차로가 예방됨.)
//
// "좌우 이웃 높이 다르게" 강제를 위한 스코어링:
//   - 인접 쌍 (0,1), (2,3), (4,5)... 의 높이가 같으면 페널티
//   - 연속(1,2), (3,4), ... 의 강조색 중복도 페널티 (덜)
// ========================================================================
const HEIGHT_ORDER = { xs: 3, s: 4, m: 5, l: 7, xl: 9 };

function scoreArrangement(arr) {
  let penalty = 0;
  // 좌우 쌍 (짝수 인덱스 i와 i+1): 높이 같으면 +10
  for (let i = 0; i + 1 < arr.length; i += 2) {
    if (arr[i].h === arr[i + 1].h) penalty += 10;
  }
  // 연속 강조색 중복 (non-light 가 두 번 연속): +3
  for (let i = 1; i < arr.length; i++) {
    const prevAccent = arr[i - 1].v !== 'light';
    const currAccent = arr[i].v !== 'light';
    if (prevAccent && currAccent && arr[i - 1].v === arr[i].v) penalty += 3;
  }
  return penalty;
}

// 필터별 캐시 — 한 번 생성된 배치는 재사용
const patternCache = {};

function getPatternForFilter(filterName, count) {
  const cacheKey = `${filterName}:${count}`;
  if (patternCache[cacheKey]) return patternCache[cacheKey];

  const hasher = hashSeed(filterName);
  const rng = mulberry32(hasher());

  // 시드 기반 셔플을 여러 번 시도해서 가장 낮은 페널티의 배열 선택
  let best = seededShuffle(bentoPool, rng);
  let bestScore = scoreArrangement(best);
  for (let t = 0; t < 40 && bestScore > 0; t++) {
    const cand = seededShuffle(bentoPool, rng);
    const s = scoreArrangement(cand);
    if (s < bestScore) { best = cand; bestScore = s; }
  }

  // count 만큼 반복 확장 (결과가 pool 보다 많을 때 이어붙임)
  const result = [];
  while (result.length < count) {
    result.push(...best);
  }
  patternCache[cacheKey] = result.slice(0, count);
  return patternCache[cacheKey];
}

let activeType = '하이라이트';

// ============ 후기 ↔ 포지션 재배정 (카드 사이즈 피팅) ============
// 공식:
//   - 벽돌 패턴(getPatternForFilter의 순서/사이즈 분포)은 건드리지 않음
//   - 각 후기는 제목 길이/줄수 기반 "최소 필요 카드 사이즈"를 가짐
//   - 긴 제목 후기(3-4줄 또는 긴 한 줄)는 m+ 카드에, 짧은 제목은 xs/s 카드에 배치
//   - 내러티브(best→sub→mainTag→id) 순서는 로컬 스왑 최소화로 가능한 보존

const sizeIdx = { xs: 0, s: 1, m: 2, l: 3, xl: 4 };
const sizeNames = ['xs', 's', 'm', 'l', 'xl'];

// 카드 사이즈별 가로/세로 여유 영역 계산 (CSS 변수 기반, DOM 불필요)
function computeCardDims() {
  const rootCS = getComputedStyle(document.documentElement);
  const rowUnit = parseFloat(rootCS.getPropertyValue('--row-unit')) || 40;
  const gap = parseFloat(rootCS.getPropertyValue('--gap')) || 8;
  const edge = parseFloat(rootCS.getPropertyValue('--edge')) || 16;
  const pad = parseFloat(rootCS.getPropertyValue('--pad')) || 18;

  // 데스크탑 (>=768px): body max-width 720px 적용
  const isDesktop = window.innerWidth >= 768;
  const bodyW = isDesktop ? Math.min(window.innerWidth, 720) : window.innerWidth;
  const cardW = (bodyW - 2 * edge - gap) / 2;
  const availW = cardW - 2 * pad;

  // cell-top 높이는 샘플이 있으면 측정, 없으면 추정
  const topEl = document.querySelector('.cell-top');
  const topH = topEl ? topEl.offsetHeight : (isDesktop ? 18 : 14);
  const topMB = topEl ? parseFloat(getComputedStyle(topEl).marginBottom) || 4 : 4;

  const sizeRows = { xs: 3, s: 4, m: 5, l: 7, xl: 9 };
  const availH = {};
  for (const [size, rows] of Object.entries(sizeRows)) {
    const cardH = rows * rowUnit + (rows - 1) * gap;
    availH[size] = cardH - 2 * pad - topH - topMB;
  }
  return { availW, availH };
}

// 히든 ruler 생성 — 제목 줄 폭 측정용 (100px 폰트 기준)
function createRuler() {
  const sampleKw = document.querySelector('.cell-keyword');
  // 샘플이 없으면 CSS 값 추정 (초기 렌더 전 호출될 경우)
  const kwCS = sampleKw ? getComputedStyle(sampleKw) : null;
  const ruler = document.createElement('span');
  ruler.style.cssText = [
    'position:absolute','left:-99999px','top:-99999px',
    'visibility:hidden','white-space:nowrap',
    'font-family:' + (kwCS ? kwCS.fontFamily : "'KBLJump', sans-serif"),
    'font-weight:' + (kwCS ? kwCS.fontWeight : '700'),
    'font-size:100px',
    'letter-spacing:' + (kwCS ? kwCS.letterSpacing : '-0.03em'),
    'line-height:1.18'
  ].join(';');
  document.body.appendChild(ruler);
  return ruler;
}

// 후기의 최소 필요 사이즈 계산 (목표 FS 기준)
//   - 가로: scaledLineW = maxLineW × targetFS/100 ≤ availW
//   - 세로: linesN × targetFS × 1.18 ≤ availH[size]
//   → 가로가 전체 사이즈 공통이므로 모든 사이즈에서 OK/실패 동일
//   → 사이즈를 가르는 건 세로뿐. 세로가 수용되는 최소 사이즈가 minSize
function classifyMinSize(review, targetFS, ruler, dims) {
  const lines = getKeyword(review).split('\n');
  if (!lines.length) return 0;
  let maxW = 0;
  lines.forEach(line => {
    ruler.textContent = line;
    const w = ruler.offsetWidth;
    if (w > maxW) maxW = w;
  });
  for (let k = 0; k < sizeNames.length; k++) {
    const size = sizeNames[k];
    const neededH = lines.length * targetFS * 1.18;
    if (neededH <= dims.availH[size]) {
      return k;  // 이 사이즈부터 세로로 들어감
    }
  }
  return sizeNames.length - 1;  // xl도 버거우면 xl
}

// 재배정: 내러티브 순서로 시작, 제약 어긋나면 로컬 스왑
function rearrangeForFit(filtered, pattern, targetFS) {
  const n = filtered.length;
  if (!n) return [];
  const dims = computeCardDims();
  const ruler = createRuler();

  // 각 후기의 minSize(요구 사이즈 인덱스) 계산
  const minSizes = filtered.map(r => classifyMinSize(r, targetFS, ruler, dims));
  ruler.remove();

  // assignment[i] = filtered 의 인덱스 → 포지션 i 에 배정
  // 초기값은 원본 내러티브 순서
  const assignment = filtered.map((_, i) => i);

  // 포지션 i의 사이즈가 작은데 assignment[i]의 minSize가 더 크면 스왑 탐색
  for (let i = 0; i < n; i++) {
    const posSize = sizeIdx[pattern[i].h];
    const curIdx = assignment[i];
    const curReq = minSizes[curIdx];
    if (curReq <= posSize) continue;  // 이미 fit

    // i와 swap 가능한 j 찾기 (가까운 순으로 탐색 = 내러티브 훼손 최소)
    let swapJ = -1;
    const tryOrder = [];
    for (let d = 1; d < n; d++) {
      if (i + d < n) tryOrder.push(i + d);
      if (i - d >= 0) tryOrder.push(i - d);
    }
    for (const j of tryOrder) {
      const jPosSize = sizeIdx[pattern[j].h];
      const jReq = minSizes[assignment[j]];
      // j의 포지션이 curReq를 수용 가능 AND j의 후기가 i의 포지션에 수용 가능
      if (curReq <= jPosSize && jReq <= posSize) {
        swapJ = j;
        break;
      }
    }
    if (swapJ >= 0) {
      [assignment[i], assignment[swapJ]] = [assignment[swapJ], assignment[i]];
    }
    // 못 찾으면 그대로 둠 (최종 글로벌 FS가 전체적으로 조금 작아질 뿐)
  }

  return assignment.map(idx => filtered[idx]);
}

// 필터별 재배정 결과 캐시 (resize 시 무효화)
let _arrangementByFilter = {};

function getArrangementForFilter(filterType) {
  if (_arrangementByFilter[filterType]) return _arrangementByFilter[filterType];

  const filtered = filterType === '하이라이트'
    ? reviews.filter(r => r.tags && r.tags.includes('하이라이트'))
    : reviews.filter(r => r.tags && r.tags.includes(filterType));

  const sourceRank = { 'best': 0, 'sub': 1 };
  filtered.sort((a, b) => {
    const s = (sourceRank[a.source] ?? 2) - (sourceRank[b.source] ?? 2);
    if (s !== 0) return s;
    const ai = mainTagOrder.indexOf(a.mainTag);
    const bi = mainTagOrder.indexOf(b.mainTag);
    const ma = ai === -1 ? 999 : ai;
    const mb = bi === -1 ? 999 : bi;
    if (ma !== mb) return ma - mb;
    return b.id - a.id;
  });

  if (!filtered.length) {
    _arrangementByFilter[filterType] = { filtered: [], pattern: [], arranged: [] };
    return _arrangementByFilter[filterType];
  }

  const pattern = getPatternForFilter(filterType, filtered.length);
  // 목표 FS: 현재 뷰포트의 CSS 기본 FS (모바일 26 / 데스크탑 36)
  const isDesktop = window.innerWidth >= 768;
  const targetFS = isDesktop ? 36 : 26;
  const arranged = rearrangeForFit(filtered, pattern, targetFS);

  _arrangementByFilter[filterType] = { filtered, pattern, arranged };
  return _arrangementByFilter[filterType];
}

function render() {
  const grid = document.getElementById('bento');
  const arr = getArrangementForFilter(activeType);
  const { arranged, pattern } = arr;

  if (!arranged.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;padding:60px;text-align:center;font-size:13px;opacity:0.5;letter-spacing:0.05em">결과 없음</div>';
    return;
  }

  // HTML 특수문자 이스케이프
  const esc = s => String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

  grid.innerHTML = arranged.map((r, i) => {
    const p = pattern[i];
    // 제목을 줄 단위로 분할 → 각 줄을 .kw-line 스팬으로 감싸
    const keywordHtml = getKeyword(r)
      .split('\n')
      .map(line => `<span class="kw-line">${esc(line)}</span>`)
      .join('');
    const subKeyword = esc(typeLabel[r.type] || r.type);
    const ariaLabel = esc((r.newTitle || '').replace(/\n/g,' ') + ' — 후기 자세히 보기');
    const cappedIndex = Math.min(i, 12);
    const styleVars = `--card-index:${cappedIndex};`;

    return `
      <article class="cell h-${p.h} v-${p.v}" data-id="${r.id}" style="${styleVars}" role="button" tabindex="0" aria-label="${ariaLabel}">
        <div class="cell-top">
          <span class="cell-sub">${subKeyword}</span>
          <svg class="cell-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <line x1="7" y1="17" x2="17" y2="7"/>
            <polyline points="8 7 17 7 17 16"/>
          </svg>
        </div>
        <div class="cell-keyword">${keywordHtml}</div>
      </article>
    `;
  }).join('');

  fitCardTitles();
}

// ============ 카드 타이틀 동적 폰트 사이징 (전역 단일 FS) ============
// 핵심 공식 (깨뜨리지 말 것!):
//   ① 모든 탭의 모든 카드 FS 동일 — 사이즈 무관하게 하나의 값
//   ② 좁은 화면에서도 글자가 잘리면 안 됨 (FS가 줄어들어 수용)
//   ③ 카드 내 제목은 좌측 하단 정렬 (margin-top:auto + align-items:flex-start)
//   ④ 긴 제목 후기는 re-arrangement로 m+ 카드에 배정 (render 전 단계에서 처리)
//   ⑤ 재배정 덕에 전역 minFS가 refFS(26/36)에 근접 → 큼직한 text
//
// 구현:
//   - render() 가 getArrangementForFilter → rearrangeForFit 으로 이미 최적 배정 완료
//   - computeGlobalCardFS 는 모든 필터의 arranged 리스트를 순회하며 최소 FS 산출
//   - 사이즈 클래스별 구분 없이 단 하나의 전역 FS를 모든 카드에 주입

let _globalCardFS = null;

function computeGlobalCardFS() {
  const LINE_HEIGHT = 1.18;
  const MAX_FS = 120;   // 120 상향 — 사용자 요청 2배 배율 적용 시 cap에 걸리지 않도록

  // 카드 dimensions (sample card 기반, 없으면 CSS-derived)
  const dims = computeCardDims();

  // 히든 ruler
  const ruler = createRuler();

  const filterTypes = Array.from(document.querySelectorAll('.chip')).map(c => c.dataset.type);
  let minFS = Infinity;

  filterTypes.forEach(type => {
    const { arranged, pattern } = getArrangementForFilter(type);
    if (!arranged.length) return;

    arranged.forEach((r, i) => {
      const lines = getKeyword(r).split('\n');
      if (!lines.length) return;
      let maxW = 0;
      lines.forEach(line => {
        ruler.textContent = line;
        const w = ruler.offsetWidth;
        if (w > maxW) maxW = w;
      });
      if (maxW === 0) return;

      const size = pattern[i].h;
      const ah = dims.availH[size];
      if (!ah || ah <= 0) return;

      const fsByW = 100 * (dims.availW / maxW);
      const fsByH = ah / (lines.length * LINE_HEIGHT);
      const cardCap = Math.min(fsByW, fsByH);
      if (cardCap < minFS) minFS = cardCap;
    });
  });

  ruler.remove();
  if (minFS === Infinity) return null;
  return Math.min(minFS, MAX_FS);
}

// fitCardTitles: v04w10 기본 FS(모바일 26px / PC 36px)를 상한으로 두되,
// 좁은 뷰포트에서 텍스트가 카드 폭을 넘으면 전체 FS를 등비율 축소.
//   ① 넓은 화면: CSS clamp 값(최대 26/36)을 그대로 사용 → v04w10 감성 유지
//   ② 좁은 화면: 가장 긴 줄이 카드 content 폭(×SAFETY)을 넘으면 비율 축소
//   ③ 모든 카드 동일 FS (공식 유지)
//   ④ 좌우 패딩 균형 — SAFETY로 오른쪽 여유 자동 확보
function fitCardTitles() {
  const cards = document.querySelectorAll('.cell');
  const keywords = document.querySelectorAll('.cell-keyword');
  if (!cards.length || !keywords.length) return;

  const SAFETY = 0.96;   // 96% 까지만 사용 → 오른쪽 여유 4% (≈ 좌측 패딩과 균형)
  const MIN_FS = 10;

  // 1) inline FS 초기화 → CSS clamp 값이 적용된 상태로 측정
  keywords.forEach(kw => { kw.style.fontSize = ''; });
  void keywords[0].offsetHeight;

  // 2) 샘플 카드의 content 폭 (padding 제외)
  const sample = cards[0];
  const cs = getComputedStyle(sample);
  const padL = parseFloat(cs.paddingLeft) || 0;
  const padR = parseFloat(cs.paddingRight) || 0;
  const availW = sample.clientWidth - padL - padR;
  if (availW <= 0) return;

  // 3) 현재 CSS 적용 FS
  const curFS = parseFloat(getComputedStyle(keywords[0]).fontSize);
  if (!curFS) return;

  // 4) 모든 .kw-line 중 가장 긴 줄 너비 측정
  let maxLineW = 0;
  document.querySelectorAll('.cell-keyword .kw-line').forEach(ln => {
    const w = ln.offsetWidth;
    if (w > maxLineW) maxLineW = w;
  });
  if (maxLineW === 0) return;

  // 5) 안전여유 포함 가용폭 초과 시 비율 축소
  const targetW = availW * SAFETY;
  let finalFS = curFS;
  if (maxLineW > targetW) {
    finalFS = curFS * (targetW / maxLineW);
  }
  finalFS = Math.max(MIN_FS, finalFS);

  // 6) 모든 카드에 동일 FS 주입
  keywords.forEach(kw => {
    kw.style.fontSize = finalFS.toFixed(2) + 'px';
  });
}

// 리사이즈/폰트로드 시 캐시 무효화 (arrangement + FS 모두 재계산)
let _fitCardsTimer;
function invalidateCardCaches() {
  _arrangementByFilter = {};
  _globalCardFS = null;
}
window.addEventListener('resize', () => {
  clearTimeout(_fitCardsTimer);
  _fitCardsTimer = setTimeout(() => {
    invalidateCardCaches();
    render();   // 재배정은 render에서 일어나므로 다시 호출
  }, 120);
});
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(() => {
    invalidateCardCaches();
    render();
  });
}

// ============ 언더라인 탭 — 인디케이터 이동 + 중앙 스크롤 ============
// 비유: 책갈피가 선택된 글자 아래로 슬라이드 이동.
// 탭이 가로 스크롤 가능하므로, 선택된 탭을 화면 중앙으로 자동 스크롤.
const tabsContainer = document.getElementById('type-chips');
const tabIndicator = document.getElementById('tab-indicator');

function updateTabIndicator(chip, animate = true) {
  if (!chip || !tabIndicator) return;
  // 칩 내부의 글자 span을 찾아 그 너비/위치를 기준으로 삼음
  // (칩 padding 제외 — 글자 길이에만 정확히 맞춤)
  const label = chip.querySelector('.chip-label') || chip;
  const containerRect = tabsContainer.getBoundingClientRect();
  const labelRect = label.getBoundingClientRect();
  const left = labelRect.left - containerRect.left + tabsContainer.scrollLeft;
  const width = labelRect.width;

  if (!animate) {
    // 초기 로드 시 애니메이션 없이 즉시 위치시킴
    tabIndicator.style.transition = 'none';
    tabIndicator.style.transform = `translateX(${left}px)`;
    tabIndicator.style.width = `${width}px`;
    // 한 프레임 후 트랜지션 복원
    requestAnimationFrame(() => {
      tabIndicator.style.transition = '';
    });
  } else {
    tabIndicator.style.transform = `translateX(${left}px)`;
    tabIndicator.style.width = `${width}px`;
  }
}

function scrollChipIntoCenter(chip) {
  if (!chip) return;
  const containerRect = tabsContainer.getBoundingClientRect();
  const chipRect = chip.getBoundingClientRect();
  // 칩 중앙이 컨테이너 중앙으로 오도록 scrollLeft 보정
  const chipCenter = chipRect.left + chipRect.width / 2;
  const containerCenter = containerRect.left + containerRect.width / 2;
  const delta = chipCenter - containerCenter;
  tabsContainer.scrollTo({
    left: tabsContainer.scrollLeft + delta,
    behavior: 'smooth'
  });
}

// 초기 위치 세팅 (페이지 로드 시 active 탭에 언더라인)
window.addEventListener('load', () => {
  const activeChip = tabsContainer.querySelector('.chip.active');
  updateTabIndicator(activeChip, false);
});
// 창 크기 변경 시 위치 재계산
window.addEventListener('resize', () => {
  const activeChip = tabsContainer.querySelector('.chip.active');
  updateTabIndicator(activeChip, false);
});
// 폰트(점프체) 로딩 완료 후 재계산 — 폰트 교체 순간 글자 너비가 바뀌므로
// Pretendard → 점프체로 스왑될 때 언더라인이 살짝 어긋나는 걸 방지
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(() => {
    const activeChip = tabsContainer.querySelector('.chip.active');
    updateTabIndicator(activeChip, false);
  });
}

document.getElementById('type-chips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeType = chip.dataset.type;
  // 언더라인 이동 + 선택 탭 중앙 정렬
  updateTabIndicator(chip, true);
  scrollChipIntoCenter(chip);
  render();
  // 필터 변경 시 그리드 상단으로 부드럽게 스크롤 (PC UX 개선)
  requestAnimationFrame(() => {
    const bentoSection = document.querySelector('.bento-section');
    if (bentoSection) {
      const rect = bentoSection.getBoundingClientRect();
      if (rect.top < 0) {
        bentoSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }
  });
});

render();

// Parallax 스크롤 효과 제거됨 — 카드가 고정 위치여야 클릭 정확도가 높음

// ============ Bottom Sheet 로직 ============
(function setupBottomSheet() {
  const sheet = document.getElementById('sheet');
  const overlay = document.getElementById('sheet-overlay');
  const handle = document.getElementById('sheet-handle');
  const closeBtn = document.getElementById('sheet-close');
  const grid = document.getElementById('bento');

  const subEl = document.getElementById('sheet-sub');
  const titleEl = document.getElementById('sheet-title');
  const metaEl = document.getElementById('sheet-meta');
  const highlightEl = document.getElementById('sheet-highlight');
  const fulltextEl = document.getElementById('sheet-fulltext');

  function openSheet(reviewId) {
    const review = reviews.find(r => r.id === reviewId);
    if (!review) return;

    // 콘텐츠 채우기
    subEl.textContent = typeLabel[review.type] || review.type;
    titleEl.textContent = (review.newTitle || '').replace(/\n/g, ' ');
    metaEl.innerHTML = `
      <span>${review.nickname}</span>
      <span class="dot"></span>
      <span>${review.date}</span>
      <span class="dot"></span>
      <span>#${String(review.id).padStart(3, '0')}</span>
    `;
    // 대괄호("") 안 하이라이트 문장은 제거 — 빈 값으로 초기화 + DOM 숨김
    highlightEl.textContent = '';
    highlightEl.style.display = 'none';

    // 전체 리뷰 원본
    const fullText = fullTextMap[review.id];
    if (fullText) {
      // 문단 단위로 분리해서 <p>로 감싸기 (두 줄 이상 빈 줄 = 문단 구분)
      const paragraphs = fullText.split(/\n\n+/).filter(p => p.trim());
      fulltextEl.innerHTML = paragraphs.map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
    } else {
      fulltextEl.innerHTML = '<p>전체 리뷰를 불러오는 중입니다.</p>';
    }

    // 스크롤 위치 맨 위로
    document.getElementById('sheet-body').scrollTop = 0;

    // 시트 열기
    document.body.classList.add('sheet-open');
    overlay.classList.add('open');
    sheet.classList.add('open');
    sheet.setAttribute('aria-hidden', 'false');
  }

  function closeSheet() {
    document.body.classList.remove('sheet-open');
    overlay.classList.remove('open');
    sheet.classList.remove('open');
    sheet.setAttribute('aria-hidden', 'true');
    // 드래그 transform 리셋
    sheet.style.transform = '';
    sheet.classList.remove('dragging');
  }

  // 카드 클릭 → 시트 열기 (이벤트 위임)
  // e.target 이 카드 내부 어느 요소든 closest로 .cell을 찾아 올라감
  grid.addEventListener('click', e => {
    const cell = e.target.closest('.cell');
    if (!cell) return;
    const id = parseInt(cell.dataset.id, 10);
    if (id) openSheet(id);
  });
  // 키보드 접근성: Enter / Space로 카드 열기
  grid.addEventListener('keydown', e => {
    const cell = e.target.closest('.cell');
    if (!cell) return;
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      const id = parseInt(cell.dataset.id, 10);
      if (id) openSheet(id);
    }
  });

  // 닫기 트리거들
  overlay.addEventListener('click', closeSheet);
  closeBtn.addEventListener('click', closeSheet);

  // ESC로 닫기
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && sheet.classList.contains('open')) {
      closeSheet();
    }
  });

  // 핸들 드래그로 닫기 (터치 + 마우스)
  let dragStartY = 0;
  let dragCurrentY = 0;
  let isDragging = false;

  function onDragStart(clientY) {
    isDragging = true;
    dragStartY = clientY;
    sheet.classList.add('dragging');
    document.body.classList.add('sheet-dragging');
  }

  function onDragMove(clientY) {
    if (!isDragging) return;
    dragCurrentY = clientY - dragStartY;
    if (dragCurrentY < 0) dragCurrentY = 0; // 위로는 못 당김
    sheet.style.transform = `translateY(${dragCurrentY}px)`;
  }

  function onDragEnd() {
    if (!isDragging) return;
    isDragging = false;
    sheet.classList.remove('dragging');
    document.body.classList.remove('sheet-dragging');
    // 100px 이상 당겼으면 닫기, 아니면 복귀
    if (dragCurrentY > 100) {
      closeSheet();
    } else {
      sheet.style.transform = '';
    }
    dragCurrentY = 0;
  }

  // Touch events (모바일)
  handle.addEventListener('touchstart', e => {
    onDragStart(e.touches[0].clientY);
  }, { passive: true });
  handle.addEventListener('touchmove', e => {
    onDragMove(e.touches[0].clientY);
  }, { passive: true });
  handle.addEventListener('touchend', onDragEnd);

  // Mouse events (데스크탑 — 데스크탑에선 핸들 숨겨져 있지만 대비)
  handle.addEventListener('mousedown', e => {
    e.preventDefault();
    onDragStart(e.clientY);
    const moveHandler = ev => onDragMove(ev.clientY);
    const upHandler = () => {
      onDragEnd();
      document.removeEventListener('mousemove', moveHandler);
      document.removeEventListener('mouseup', upHandler);
    };
    document.addEventListener('mousemove', moveHandler);
    document.addEventListener('mouseup', upHandler);
  });
})();
</script>
