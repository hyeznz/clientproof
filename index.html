<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F6F7F9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="format-detection" content="telephone=no">
<title>강봉원 검증 후기 — 이사짐캐리</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* ===== 새 팔레트 (4색 시스템) =====
       카드색과 글자색의 페어링 규칙:
       - black(#171717)  카드 → orange(#FE5F15) 글자
       - orange(#FE5F15) 카드 → black(#171717) 글자
       - dark gray(#4D4D4D)  카드 → light gray(#DEDEDE) 글자
       - light gray(#DEDEDE) 카드 → dark gray(#4D4D4D) 글자
    */
    --black: #171717;       /* 살짝 따뜻한 다크 */
    --orange: #FE5F15;      /* 비비드 오렌지 */
    --dark-gray: #4D4D4D;   /* 다크 그레이 */
    --light-gray: #DEDEDE;  /* 라이트 그레이 */

    /* 배경 = 레퍼런스 이미지의 실제 배경 픽셀값 (#F6F7F9, 아주 연한 쿨 그레이) */
    --bg: #F6F7F9;

    /* 텍스트 계조용 (dark-gray 기반) */
    --ink-80: rgba(77,77,77,0.85);
    --ink-60: rgba(77,77,77,0.65);
    --ink-40: rgba(77,77,77,0.4);
    --ink-10: rgba(77,77,77,0.15);

    /* 통일된 타이포 — 카드 크기별 차등 없음, 모바일 기준 */
    --text-micro: 11px;     /* 좌상단 작은 키워드 */
    --text-xs: 11px;
    --text-sm: 13px;
    --text-keyword: 26px;   /* 모바일 좁은 카드에서 wrap 방지 위해 축소 */

    /* 카드 높이 단위 */
    --row-unit: 40px;
    --gap: 8px;
    --radius: 14px;      /* 카드 모서리 둥글게 */
    --pad: 18px;         /* 카드 내부 여백 */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--black);
    line-height: 1.3;
    -webkit-font-smoothing: antialiased;
    word-break: keep-all;
    overflow-x: hidden;
    padding-top: env(safe-area-inset-top);
    padding-bottom: calc(40px + env(safe-area-inset-bottom));
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    font-feature-settings: "ss18";
  }

  .mono {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    letter-spacing: 0;
  }

  /* ============ 상단 룰 라인 ============ */
  .topline {
    height: 1px;
    background: var(--black);
    margin: 0 16px;
    max-width: 1280px;
  }
  .topline-wrap {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 16px;
  }
  .topline-wrap .topline { margin: 0; }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 16px;
    max-width: 1280px;
    margin: 0 auto;
  }
  .header-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: var(--text-micro);
    letter-spacing: 0.15em;
    color: var(--black);
    font-weight: 500;
  }
  .header-logo {
    width: 28px; height: 28px;
    background: var(--black);
    color: var(--light-gray);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Pretendard Variable', Pretendard, sans-serif;
    font-weight: 800;
    font-size: 13px;
    border-radius: 50%;
  }

  /* ============ 거대 타이틀 블록 ============ */
  /* Pretendard로 변경 — 한글 타이틀도 Pretendard ExtraBold */
  .title-block {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 16px 4px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: end;
  }
  .main-title {
    font-family: 'Pretendard Variable', Pretendard, sans-serif;
    font-weight: 900;
    font-size: clamp(64px, 19vw, 140px);
    line-height: 0.88;
    letter-spacing: -0.055em;
    color: var(--black);
  }
  .title-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: var(--text-xs);
    line-height: 1.35;
    text-align: right;
    color: var(--black);
    padding-bottom: 8px;
  }
  .title-meta strong {
    font-weight: 700;
    font-size: 14px;
    display: block;
    letter-spacing: 0.02em;
  }

  /* ============ 오렌지 배너 ============ */
  .banner {
    max-width: 1280px;
    margin: 12px auto 0;
    padding: 0 16px;
  }
  .banner-inner {
    background: var(--orange);
    color: var(--black);
    padding: 10px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: var(--text-micro);
    letter-spacing: 0.1em;
    line-height: 1.6;
    font-weight: 500;
  }
  .banner-inner .sep {
    margin: 0 6px;
    opacity: 0.7;
  }

  /* ============ 필터 바 ============ */
  .filter-bar {
    max-width: 1280px;
    margin: 16px auto 6px;
    padding: 0 16px;
  }
  .type-chips {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .type-chips::-webkit-scrollbar { display: none; }

  .chip {
    flex-shrink: 0;
    padding: 7px 14px;
    background: transparent;
    border: 1px solid var(--black);
    font-family: 'Pretendard Variable', Pretendard, sans-serif;
    font-size: var(--text-xs);
    font-weight: 600;
    color: var(--black);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
    letter-spacing: -0.01em;
  }
  .chip:hover { background: var(--black); color: var(--light-gray); }
  .chip.active {
    background: var(--black);
    color: var(--light-gray);
  }

  /* ============ 벤토 그리드 ============ */
  .bento-section {
    padding: 12px 16px 40px;
    max-width: 1280px;
    margin: 0 auto;
  }

  .bento {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: var(--row-unit);
    gap: var(--gap);
    grid-auto-flow: dense;
  }

  .cell {
    position: relative;
    overflow: hidden;
    border-radius: var(--radius);
    padding: var(--pad);
    display: flex;
    flex-direction: column;
    cursor: pointer;
  }

  /* 높이 시스템 */
  .cell.h-s { grid-row: span 4; }
  .cell.h-m { grid-row: span 6; }
  .cell.h-l { grid-row: span 8; }

  /* ===== 색상 변형 (4가지, 각 카드색에 짝지어진 글자색) =====
     v-light  : light-gray 배경 + dark-gray 글자 (흰색 대신 기본 밝은 카드)
     v-dark   : dark-gray 배경 + light-gray 글자
     v-orange : orange 배경 + black 글자
     v-black  : black 배경 + orange 글자 (유일하게 액센트색 글자)
  */
  .cell.v-light {
    background: var(--light-gray);
    color: var(--dark-gray);
  }
  .cell.v-dark {
    background: var(--dark-gray);
    color: var(--light-gray);
  }
  .cell.v-orange {
    background: var(--orange);
    color: var(--black);
  }
  .cell.v-black {
    background: var(--black);
    color: var(--orange);
  }

  /* ===== 카드 내부: 레퍼런스 구조대로 요소 3개만 ===== */
  /* 상단 영역: 좌측 작은 키워드 + 우측 화살표 */
  .cell-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }

  /* 좌상단 작은 키워드 (레퍼런스의 "Mila Torres" 자리) */
  .cell-sub {
    font-family: 'Pretendard Variable', Pretendard, sans-serif;
    font-size: var(--text-micro);
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1.3;
    opacity: 0.7;
  }

  /* 우상단 화살표 (↗) */
  .cell-arrow {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    opacity: 0.8;
  }

  /* 좌하단 메인 키워드 — 카드 크기별 폰트 차등 (2줄 안정 유지) */
  .cell-keyword {
    font-family: 'Pretendard Variable', Pretendard, sans-serif;
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1.18;
    text-align: left;
    white-space: pre-line;
    word-break: keep-all;
    overflow-wrap: break-word;
    hyphens: none;
    margin-top: auto;           /* 하단으로 밀기 */
  }
  /* 카드 높이별 키워드 크기 — 좁은 폭에서 2줄 wrap 방지 */
  .cell.h-s .cell-keyword { font-size: 22px; }
  .cell.h-m .cell-keyword { font-size: 24px; }
  .cell.h-l .cell-keyword { font-size: 26px; }

  /* ============ 하단 룰 라인 ============ */
  .bottomline {
    height: 1px;
    background: var(--black);
    max-width: 1280px;
    margin: 24px auto 0;
  }
  .footer-info {
    max-width: 1280px;
    margin: 0 auto;
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: var(--text-micro);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-60);
  }

  /* ============ 데스크탑 ============ */
  @media (min-width: 768px) {
    :root {
      --row-unit: 50px;
      --pad: 28px;
    }
    .bento {
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    /* 데스크탑은 카드 폭 여유 → 키워드 더 큼 */
    .cell.h-s .cell-keyword { font-size: 28px; }
    .cell.h-m .cell-keyword { font-size: 34px; }
    .cell.h-l .cell-keyword { font-size: 40px; }
    .header, .title-block, .banner, .filter-bar, .bento-section, .footer-info {
      padding-left: 32px;
      padding-right: 32px;
    }
    .topline, .bottomline {
      margin-left: 32px;
      margin-right: 32px;
      max-width: calc(1280px - 64px);
    }
  }

  @media (min-width: 1200px) {
    .bento {
      grid-template-columns: repeat(4, 1fr);
    }
  }

  /* ============ 진입 애니메이션 (Staggered Reveal + Spring + Scale/Opacity) ============
     카드가 한 번에 뜨지 않고 그리드 순서대로 0.05s씩 딜레이,
     도착 시 미세하게 오버슈트하는 스프링 이징,
     등장 시 scale(0.95) → 1.0 과 opacity(0 → 1)로 입체감 부여
  */
  .cell {
    animation: rise .7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    will-change: transform, opacity;
    /* 각 카드마다 인덱스 기반 delay (JS에서 --card-index 세팅) */
    animation-delay: calc(var(--card-index, 0) * 0.05s);
  }
  @keyframes rise {
    from {
      opacity: 0;
      transform: translate3d(0, 24px, 0) scale(0.95);
    }
    to {
      opacity: 1;
      transform: translate3d(0, 0, 0) scale(1);
    }
  }

  /* ============ 스크롤 시 Column Parallax ============
     왼쪽 열과 오른쪽 열이 살짝 다른 속도로 움직여 입체감.
     --parallax-y는 JS가 스크롤 속도에 따라 실시간 갱신.
     카드마다 --parallax-mult(0.8~1.2) 편차로 액체 유영감.
  */
  html, body {
    overscroll-behavior-y: contain;
  }

  .cell {
    /* 진입 애니메이션이 끝난 후에도 transform 이어받도록 합성 */
    transition: transform .8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* 스크롤 중일 때만 parallax transform 활성 (진입 애니메이션과 충돌 방지) */
  .cell.settled {
    transform: translate3d(0, calc(var(--parallax-y, 0px) * var(--parallax-mult, 1)), 0);
  }
  /* hover 효과는 mouse/trackpad 기기에서만 */
  @media (hover: hover) and (pointer: fine) {
    .cell.settled:hover {
      transform: translate3d(0, calc(var(--parallax-y, 0px) * var(--parallax-mult, 1) - 2px), 0);
      transition: transform .2s ease;
    }
  }

  /* reduced-motion 존중 */
  @media (prefers-reduced-motion: reduce) {
    .cell {
      animation: none;
      transition: none;
      transform: none;
    }
    .cell.settled {
      transform: none;
    }
  }
</style>
</head>

<script>

const reviews = [

  // ===== [당일 추가금] 카테고리 =====

// ============ 매핑 ============
// 메인 키워드 (카드 주인공) — 고객이 실제 묻는 질문 형태
// 2줄 레이아웃: \n 기준으로 줄바꿈
const keywordMap = {
  '가구파손':   '파손\n없나요?',
  '당일추가금': '추가금\n안 붙나요?',
  '정확한견적': '견적\n정확한가요?',
  '가전연결':   '세탁기\n연결 되나요?',
  '불친절':     '기사님\n친절한가요?',
  '한국인팀':   '한국인\n팀인가요?',
  '짐정리':     '정리까지\n해주나요?',
  '돌발상황':   '비 오면\n어떻게 하나요?'
};

// 작은 키워드 (좌상단 — 이사 타입)
const typeLabel = {
  '일반포장': '일반 포장이사',
  '보관이사': '보관이사',
  '신혼': '신혼 첫이사',
  '부모님': '부모님 이사',
  '원룸': '원룸 이사',
  '장거리': '장거리 이사',
  '재이용': '재이용 고객'
};

function getKeyword(r) {
  // 각 리뷰가 가진 고유 질문 키워드 사용
  if (r.question) return r.question;
  // fallback: 카테고리 기반 매핑 (하위 호환)
  if (r.concerns && r.concerns.length > 0) {
    return keywordMap[r.concerns[0]] || r.concerns[0];
  }
  return r.type;
}

// ============ 벤토 패턴 ============
// 18장 — 경계선 어긋남 유지, 색 분포 밸런스
// light(기본) 지배적 / orange·black 액센트 / dark 리듬
const bentoPattern = [
  { h: 'l', v: 'orange' },
  { h: 'm', v: 'light' },
  { h: 's', v: 'black' },
  { h: 'm', v: 'light' },
  { h: 'l', v: 'light' },
  { h: 's', v: 'dark' },
  { h: 'm', v: 'light' },
  { h: 'l', v: 'dark' },
  { h: 's', v: 'orange' },
  { h: 'm', v: 'light' },
  { h: 'm', v: 'light' },
  { h: 's', v: 'dark' },
  { h: 's', v: 'light' },
  { h: 'm', v: 'orange' },
  { h: 'l', v: 'light' },
  { h: 's', v: 'light' },
  { h: 'm', v: 'dark' },
  { h: 'l', v: 'light' }
];

let activeType = 'all';

function render() {
  const grid = document.getElementById('bento');
  let filtered = reviews.filter(r => activeType === 'all' || r.type === activeType);

  const genreRank = { '찐감동': 4, '디테일': 3, '비교형': 2, '일반': 1 };
  filtered.sort((a, b) => {
    const g = genreRank[b.genre] - genreRank[a.genre];
    return g !== 0 ? g : b.id - a.id;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;padding:60px;text-align:center;font-size:13px;opacity:0.5;letter-spacing:0.05em">결과 없음</div>';
    return;
  }

  grid.innerHTML = filtered.map((r, i) => {
    const pattern = bentoPattern[i % bentoPattern.length];
    const keyword = getKeyword(r);
    const subKeyword = typeLabel[r.type] || r.type;

    // Column parallax multiplier
    // 카드가 어느 열에 속하는지 (모바일 2열 기준) + 미세 편차
    // 왼쪽 열(짝수 인덱스) = 1.0, 오른쪽 열(홀수) = 0.75 → 20~25% 속도 차
    // 여기에 카드별 미세 편차(±0.1) 추가해 "액체 유영" 느낌
    const isRightCol = i % 2 === 1;
    const baseMult = isRightCol ? 0.75 : 1.0;
    const jitter = ((i * 37) % 20 - 10) / 100; // -0.10 ~ +0.10
    const parallaxMult = (baseMult + jitter).toFixed(2);

    const styleVars = `--card-index:${i}; --parallax-mult:${parallaxMult};`;

    return `
      <article class="cell h-${pattern.h} v-${pattern.v}" data-id="${r.id}" style="${styleVars}">
        <div class="cell-top">
          <span class="cell-sub">${subKeyword}</span>
          <svg class="cell-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <line x1="7" y1="17" x2="17" y2="7"/>
            <polyline points="8 7 17 7 17 16"/>
          </svg>
        </div>
        <div class="cell-keyword">${keyword}</div>
      </article>
    `;
  }).join('');

  // 진입 애니메이션이 끝난 후 .settled 클래스 부여 (이후 parallax transform 활성)
  // 가장 늦게 들어오는 카드 기준 delay 계산: (n-1) * 0.05s + 0.7s (애니메이션 길이)
  const totalDuration = filtered.length * 50 + 700;
  setTimeout(() => {
    document.querySelectorAll('.cell').forEach(c => c.classList.add('settled'));
  }, totalDuration);
}

document.getElementById('type-chips').addEventListener('click', e => {
  if (!e.target.matches('.chip')) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  activeType = e.target.dataset.type;
  render();
});

render();

// ============ 스크롤 기반 Column Parallax ============
// 스크롤 속도에 따라 --parallax-y 갱신 → 각 카드는 자신의 --parallax-mult로 변위 결정
// 왼쪽 열 1.0배 / 오른쪽 열 0.75배 + 카드별 ±0.1 jitter → 액체 유영감
(function setupParallax() {
  if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  let lastScrollY = window.scrollY;
  let ticking = false;
  let idleTimer;
  const MAX_OFFSET = 14;      // 최대 변위 (px) — 열별 multiplier 곱해지므로 여유있게
  const VELOCITY_CAP = 50;    // 속도 정규화 기준

  function applyOffset(offset) {
    document.documentElement.style.setProperty('--parallax-y', offset + 'px');
  }

  function onScroll() {
    const currentY = window.scrollY;
    const delta = currentY - lastScrollY;

    // 스크롤 방향과 반대로 카드가 살짝 끌려옴 (탄성감)
    const velocity = Math.max(-VELOCITY_CAP, Math.min(VELOCITY_CAP, delta));
    const offset = -(velocity / VELOCITY_CAP) * MAX_OFFSET;

    applyOffset(offset);

    lastScrollY = currentY;

    // 멈추면 스프링 이징으로 원위치 복귀 (transition이 처리)
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => applyOffset(0), 60);

    ticking = false;
  }

  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(onScroll);
      ticking = true;
    }
  }, { passive: true });
})();
</script>
